<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS Genesis</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:#000;color:white}

/* ===== BOOT ===== */
#boot{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:99999;
}
#boot h1{animation:fade 2s infinite}
@keyframes fade{50%{opacity:0.3}}

/* ===== BACKGROUND ENGINE FIXED ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s ease;
z-index:-5;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* overlay */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
z-index:-1;
}

/* ===== LOCK ===== */
#lock{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
z-index:1000;
}

#login{
display:flex;
gap:10px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:12px;
}

input{
background:transparent;
border:none;
color:white;
outline:none;
}

/* ===== DESKTOP ===== */
#desktop{
display:none;
height:100vh;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
padding:8px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
z-index:100;
}

.icon{
cursor:pointer;
padding:6px;
border-radius:8px;
transition:0.2s;
position:relative;
}

.icon:hover{background:rgba(255,255,255,0.1)}

/* TOOLTIP */
.icon:hover::after{
content:attr(data-tip);
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:black;
padding:5px;
font-size:12px;
border-radius:6px;
white-space:nowrap;
}

/* ===== WINDOW SYSTEM ===== */
.window{
position:absolute;
width:300px;
height:300px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(15px);
border-radius:12px;
overflow:hidden;
display:flex;
flex-direction:column;
resize:none;
}

.titlebar{
background:rgba(255,255,255,0.1);
padding:6px;
cursor:grab;
display:flex;
justify-content:space-between;
}

.close{
cursor:pointer;
}

/* CONTENT */
.content{flex:1;padding:10px}

/* TEXTBOX */
textarea{
width:100%;
height:120px;
background:rgba(255,255,255,0.08);
border:none;
color:white;
padding:8px;
border-radius:10px;
}

.tools{
display:flex;
gap:8px;
margin-top:6px;
}

.tools button{
background:rgba(255,255,255,0.1);
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
}

/* SETTINGS */
#settings{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
transition:0.3s;
z-index:999;
padding:10px;
}
#settings.open{right:0}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
<h1>Diary OS Booting...</h1>
</div>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCK -->
<div id="lock">
<h1>Diary OS</h1>
<div id="login">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">🔓</button>
</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- TASKBAR -->
<div id="taskbar">

<div>
<span class="icon" data-tip="Write Diary" onclick="openApp('note')">✍️</span>
<span class="icon" data-tip="AI Assistant" onclick="openApp('ai')">🧠</span>
<span class="icon" data-tip="Settings" onclick="toggleSettings()">⚙️</span>
</div>

<div>
<span class="icon" data-tip="Start Menu">🪟</span>
</div>

</div>

</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="changeBG()">Change BG</button>
<button onclick="toggleAuto()">Auto BG</button>
</div>

<script>

/* ===== BOOT ===== */
setTimeout(()=>{
boot.style.display="none";
},2000);

/* ===== AUTH ===== */
const PASSWORD="adhvik_diary";

/* ===== BACKGROUND SYSTEM FIXED ===== */
let cur=1;

function setBG(url){
let next=cur===1?bg2:bg1;
let prev=cur===1?bg1:bg2;

next.style.backgroundImage=`url(${url})`;
next.style.opacity=1;
prev.style.opacity=0;

cur=cur===1?2:1;
}

let auto=true;

setInterval(()=>{
if(!auto) return;
setBG("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
},8000);

/* ===== LOGIN ===== */
function login(){
if(pass.value===PASSWORD){
lock.style.display="none";
desktop.style.display="block";
}else alert("Wrong password");
}

/* ===== WINDOW SYSTEM ===== */
let z=10;

function createWindow(title,contentHTML){
let win=document.createElement("div");
win.className="window";
win.style.top="100px";
win.style.left="100px";
win.style.zIndex=z++;

win.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span class="close" onclick="this.parentElement.parentElement.remove()">✖</span>
</div>
<div class="content">${contentHTML}</div>
`;

document.body.appendChild(win);

/* DRAG */
let drag=false,offsetX,offsetY;

win.querySelector(".titlebar").onmousedown=(e)=>{
drag=true;
offsetX=e.clientX-win.offsetLeft;
offsetY=e.clientY-win.offsetTop;
win.style.zIndex=z++;
};

document.onmousemove=(e)=>{
if(!drag) return;
win.style.left=(e.clientX-offsetX)+"px";
win.style.top=(e.clientY-offsetY)+"px";
};

document.onmouseup=()=>drag=false;

return win;
}

/* ===== APPS ===== */
function openApp(type){

if(type==="note"){
createWindow("Diary Entry",`
<textarea id="t"></textarea>
<div class="tools">
<button onclick="save()">💾 Save</button>
<button onclick="alert('Emoji picker')">😊</button>
<button onclick="alert('File upload')">➕</button>
</div>
`);
}

if(type==="ai"){
createWindow("AI Assistant",`
<p>Ask me anything about your diary.</p>
<textarea placeholder="Type..."></textarea>
`);
}
}

/* ===== SETTINGS ===== */
function toggleSettings(){
settings.classList.toggle("open");
}

function changeBG(){
setBG("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
}

function toggleAuto(){
auto=!auto;
}

</script>

</body>
</html>
