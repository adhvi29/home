<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary OS Stable</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
html,body{height:100%;overflow:hidden;background:#000;color:#fff}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.2s ease;
z-index:-3;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* dark overlay */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
z-index:-1;
}

/* ===== LOCKSCREEN ===== */
#lockscreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
z-index:1000;
}

#time{font-size:60px;font-weight:300}
#date{opacity:0.8}

/* login box */
#loginBox{
display:flex;
gap:8px;
align-items:center;
background:rgba(255,255,255,0.08);
padding:10px 15px;
border-radius:12px;
backdrop-filter:blur(10px);
}

#pass{
background:transparent;
border:none;
outline:none;
color:white;
width:180px;
}

/* ===== APP ===== */
#app{
display:none;
height:100%;
flex-direction:column;
z-index:10;
position:relative;
}

/* TOPBAR */
#topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
z-index:20;
}

.iconBtn{cursor:pointer;opacity:0.8;margin:0 6px}
.iconBtn:hover{opacity:1}

/* CONTENT */
#content{
flex:1;
overflow:auto;
padding:15px;
z-index:10;
}

/* ===== WRITE BOX ===== */
.writeBox{
display:none;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:200px;
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.08);
color:white;
}

/* TOOLBAR (NEXT TO TEXTBOX) */
.toolbar{
display:flex;
gap:8px;
}

.toolbar button{
padding:8px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

/* ===== SETTINGS (FIXED CLICK ISSUE) ===== */
#settings{
position:fixed;
right:-340px;
top:0;
width:340px;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(20px);
padding:15px;
transition:0.4s;
z-index:9999;
pointer-events:auto;
}
#settings.open{right:0}

/* toast */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.4s;
pointer-events:none;
z-index:9999;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="time"></div>
<div id="date"></div>

<div id="loginBox">
<input id="pass" type="password" placeholder="Password">
<button onclick="unlock()">Enter</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="topbar">
<div>📔 Diary OS</div>
<div>
<span class="iconBtn" onclick="openWrite()">✍️</span>
<span class="iconBtn" onclick="toggleSettings()">⚙️</span>
</div>
</div>

<div id="content"></div>

</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="toggleAuto()">Auto Background</button>
<button onclick="toggleMood()">Mood Background</button>
<button onclick="changeBg()">Change BG Now</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

/* ===== CORE ===== */
const PASSWORD="adhvik_diary";

/* STATE */
let autoBg=true;
let moodBg=true;
let writeOpen=false;

/* ===== CLOCK ===== */
function updateClock(){
let d=new Date();
time.innerText=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
date.innerText=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* ===== TOAST ===== */
function toast(msg){
toast.innerText=msg;
toast.style.opacity=1;
setTimeout(()=>toast.style.opacity=0,2000);
}

/* ===== BACKGROUND SYSTEM (FIXED) ===== */
let cur=1;

function setBg(url){
let next=cur===1?bg2:bg1;
let prev=cur===1?bg1:bg2;

next.style.backgroundImage=`url(${url})`;
next.style.opacity=1;
prev.style.opacity=0;

cur=cur===1?2:1;
}

/* STARTUP CHANGING BACKGROUND */
let startupImgs=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d"
];

setInterval(()=>{
if(!autoBg) return;
setBg(startupImgs[Math.floor(Math.random()*startupImgs.length)]);
},7000);

/* ===== UNLOCK ===== */
function unlock(){
if(pass.value===PASSWORD){
lockscreen.style.display="none";
app.style.display="flex";
toast("Unlocked");
}else{
toast("Wrong password");
}
}

/* ===== WRITE BOX (CLOSE AFTER USE) ===== */
function openWrite(){
if(writeOpen){
toast("Close current note first");
return;
}

writeOpen=true;

content.innerHTML=`
<div class="writeBox">
<textarea id="txt"></textarea>

<div class="toolbar">
<button onclick="save()">Save</button>
<button onclick="toast('Emoji picker')">😊</button>
<button onclick="toast('File upload')">➕</button>
<button onclick="closeWrite()">Close</button>
</div>
</div>
`;
}

function closeWrite(){
writeOpen=false;
content.innerHTML="";
toast("Closed editor");
}

/* SAVE */
function save(){
setBg("https://images.unsplash.com/photo-1519681393784-d120267933ba");
closeWrite();
toast("Saved");
}

/* ===== SETTINGS ===== */
function toggleSettings(){
settings.classList.toggle("open");
toast("Settings toggled");
}

function toggleAuto(){
autoBg=!autoBg;
toast("Auto BG: "+autoBg);
}

function toggleMood(){
moodBg=!moodBg;
toast("Mood BG: "+moodBg);
}

function changeBg(){
setBg("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
toast("Background changed");
}

</script>

</body>
</html>
