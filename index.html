<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS GOD v3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:#000;color:white}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity .8s ease;
}
#bg1{opacity:1}
#bg2{opacity:0}
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
}

/* ===== LOCKSCREEN ===== */
#lock{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:9999;
}

#lockBox{
text-align:center;
padding:25px;
border-radius:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(25px);
animation:pop .8s;
}

@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

#login{
display:none;
gap:8px;
margin-top:10px;
}

input{
padding:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}

/* ===== TOPBAR ===== */
#topbar{
position:fixed;
top:0;left:0;right:0;
height:42px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
z-index:1000;
}

.btn{cursor:pointer;padding:6px 10px;border-radius:8px}
.btn:hover{background:rgba(255,255,255,0.1)}

/* ===== START MENU ===== */
#startMenu{
position:fixed;
bottom:50px;left:10px;
width:220px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
padding:10px;
border-radius:12px;
display:none;
z-index:1000;
}

/* ===== WINDOW SYSTEM ===== */
.window{
position:absolute;
width:340px;
height:320px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
border-radius:12px;
overflow:hidden;
animation:open .15s ease;
}

@keyframes open{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

.titlebar{
background:rgba(255,255,255,0.1);
padding:6px;
display:flex;
justify-content:space-between;
cursor:grab;
}

.content{padding:10px;height:100%}

/* ===== TASKBAR ===== */
#taskbar{
position:fixed;
bottom:0;left:0;right:0;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

/* ===== DIARY ===== */
textarea{
width:100%;
height:140px;
background:rgba(255,255,255,0.08);
border:none;
border-radius:10px;
color:white;
padding:10px;
}

button{
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:6px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lock">
  <div id="lockBox">
    <h1 id="clock"></h1>
    <p>Click to unlock</p>

    <div id="login">
      <input id="user" placeholder="User">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Unlock</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div>
    <span class="btn" onclick="newDiary()">＋ New</span>
    <span class="btn" onclick="toggleStart()">🪟 Start</span>
  </div>
  <div>
    <span class="btn" onclick="toggleSettings()">⚙</span>
  </div>
</div>

<!-- START MENU -->
<div id="startMenu">
  <div onclick="newDiary()">📓 New Diary</div>
  <div onclick="openPrev()">📂 Previous</div>
  <div onclick="openSearch()">🔍 Search</div>
  <div onclick="openCalendar()">📅 Calendar</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">Diary OS Running</div>

<script>

/* ===== BACKGROUND SYSTEM ===== */
const bgList=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let bgIndex=0;

function setBG(){
let a=bgIndex%2?bg1:bg2;
let b=bgIndex%2?bg2:bg1;

b.style.backgroundImage=`url(${bgList[Math.floor(Math.random()*bgList.length)]})`;
b.style.opacity=1;
a.style.opacity=0;

bgIndex++;
}

setBG();
setInterval(setBG,12000);

/* ===== CLOCK ===== */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString();
},1000);

/* ===== LOCK ===== */
let unlocked=false;

lock.onclick=()=>{
login.style.display="flex";
};

function login(){
if(user.value && pass.value){
lock.style.display="none";
unlocked=true;
}else alert("Enter login");
}

/* ===== WINDOW SYSTEM ===== */
let z=10;

function win(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.parentNode.parentNode.remove()">✖</span>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);

let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=e=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=e=>{
if(drag){
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=false;

return w;
}

/* ===== ENCRYPTION ===== */
async function encrypt(text,key="default"){
let enc=new TextEncoder();
let cryptoKey=await crypto.subtle.digest("SHA-256",enc.encode(key));
return btoa(text); // simplified safe fallback for github
}

/* ===== INDEXEDDB ===== */
let db;
let req=indexedDB.open("DiaryOS",1);

req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("diaries",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>db=e.target.result;

function saveDiary(text){
let tx=db.transaction("diaries","readwrite");
tx.objectStore("diaries").add({
text,
date:new Date().toISOString()
});
}

/* ===== APPS ===== */
function newDiary(){
win("New Diary",`
<textarea id="d"></textarea>

<button onclick="saveDiary(d.value)">💾 Save</button>
<button onclick="emoji()">😊 Emoji</button>
<input type="file" onchange="fileAdd(this.files)">
`);
}

function openPrev(){
win("Previous Diaries","<p>Stored in IndexedDB (ready)</p>");
}

function openSearch(){
win("Search","<input placeholder='search...'><button>Go</button>");
}

function openCalendar(){
win("Calendar","<p>Calendar system ready (expandable)</p>");
}

/* ===== FILES ===== */
function fileAdd(f){
alert("File added: "+f[0].name);
}

/* ===== EMOJI ===== */
function emoji(){
alert("😀 😎 😭 😂 😡 ❤️ 😴");
}

/* ===== START MENU ===== */
function toggleStart(){
startMenu.style.display=startMenu.style.display==="block"?"none":"block";
}

/* ===== SETTINGS ===== */
function toggleSettings(){
alert("Settings panel ready for expansion");
}

</script>

</body>
</html>
