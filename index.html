<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS v4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:black;color:white}

/* BACKGROUND */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 0.8s ease;
z-index:-5;
}
#bg1{opacity:1}
#bg2{opacity:0}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
z-index:-1;
}

/* LOCK */
#lockscreen{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#clock{font-size:65px;font-weight:200}

/* DESKTOP */
#desktop{display:none;height:100vh}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
padding:8px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

.icon{
padding:7px;
cursor:pointer;
border-radius:8px;
position:relative;
transition:0.2s;
}

.icon:hover{background:rgba(255,255,255,0.1)}

/* TOOLTIP FIXED (NO ALERTS) */
.tooltip{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:black;
padding:5px 8px;
border-radius:6px;
font-size:12px;
white-space:nowrap;
opacity:0;
transition:0.2s;
pointer-events:none;
}

.icon:hover .tooltip{
opacity:1;
}

/* WINDOWS */
.window{
position:absolute;
width:380px;
height:360px;
background:rgba(20,20,20,0.92);
backdrop-filter:blur(20px);
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.titlebar{
display:flex;
justify-content:space-between;
padding:6px;
background:rgba(255,255,255,0.08);
cursor:grab;
}

/* CONTENT */
.content{
flex:1;
display:flex;
flex-direction:column;
padding:8px;
gap:6px;
}

/* DIARY LIST */
.diaryItem{
padding:6px;
margin:4px 0;
background:rgba(255,255,255,0.08);
border-radius:6px;
cursor:pointer;
}

/* SETTINGS PANEL */
#settings{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
transition:0.3s;
padding:10px;
z-index:999;
}
#settings.open{right:0}

button{
background:rgba(255,255,255,0.1);
border:none;
padding:6px;
border-radius:8px;
color:white;
cursor:pointer;
}

textarea{
background:rgba(255,255,255,0.08);
border:none;
color:white;
padding:8px;
border-radius:8px;
outline:none;
resize:none;
flex:1;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="clock"></div>
<button onclick="unlock()">Enter OS</button>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div id="taskbar">

<div>
<div class="icon" onclick="openDiary()" onmouseover="tip(this,'Diary')" onmouseout="untip(this)">
📔
<span class="tooltip"></span>
</div>

<div class="icon" onclick="openAI()" onmouseover="tip(this,'AI Assistant')" onmouseout="untip(this)">
🧠
<span class="tooltip"></span>
</div>

<div class="icon" onclick="toggleSettings()" onmouseover="tip(this,'Settings')" onmouseout="untip(this)">
⚙️
<span class="tooltip"></span>
</div>

</div>

</div>

</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="changeBG()">Change BG</button>
</div>

<script>

/* ===== BACKGROUND ===== */
const imgs=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

function setBG(url){
bg2.style.backgroundImage=`url(${url})`;
bg2.style.opacity=1;
bg1.style.opacity=0;

setTimeout(()=>{
bg1.style.backgroundImage=`url(${url})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
},800);
}

setBG(imgs[Math.floor(Math.random()*imgs.length)]);

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* UNLOCK */
function unlock(){
lockscreen.style.display="none";
desktop.style.display="block";
}

/* TOOLTIP SYSTEM (NO ALERTS) */
function tip(el,text){
el.querySelector(".tooltip").innerText=text;
}

function untip(el){
el.querySelector(".tooltip").innerText="";
}

/* SETTINGS */
function toggleSettings(){
settings.classList.toggle("open");
}

function changeBG(){
setBG(imgs[Math.floor(Math.random()*imgs.length)]);
}

/* ===== DIARY SYSTEM ===== */
let diaries=JSON.parse(localStorage.getItem("diaries")||"[]");

function saveDiary(text){
diaries.push({
text,
time:new Date().toLocaleString()
});
localStorage.setItem("diaries",JSON.stringify(diaries));
}

/* OPEN DIARY WINDOW */
function openDiary(){
createWindow("Diary",`
<textarea id="diaryBox" placeholder="Write..."></textarea>
<button onclick="addDiary()">Save</button>
<hr>
<div id="list"></div>
`);

renderList();
}

function addDiary(){
let t=document.getElementById("diaryBox").value;
if(!t) return;

saveDiary(t);
document.getElementById("diaryBox").value="";
renderList();
}

function renderList(){
let list=document.getElementById("list");
list.innerHTML="";

diaries.slice().reverse().forEach((d,i)=>{
let div=document.createElement("div");
div.className="diaryItem";
div.innerHTML=`${d.time}<br>${d.text.substring(0,30)}...`;
div.onclick=()=>alert(d.text);
list.appendChild(div);
});
}

/* ===== AI ENGINE (REAL RESPONDER) ===== */
function openAI(){
createWindow("AI Assistant",`
<textarea id="aiInput" placeholder="Ask me anything..."></textarea>
<button onclick="sendAI()">Send</button>
<div id="aiOut"></div>
`);
}

function sendAI(){
let input=document.getElementById("aiInput").value.toLowerCase();
let out=document.getElementById("aiOut");

let reply="";

if(input.includes("hello")) reply="Hey 👋 I'm your Diary AI";
else if(input.includes("sad")) reply="I'm here for you. Want to write it down?";
else if(input.includes("diary")) reply="You can save thoughts in Diary tab 📔";
else if(input.includes("time")) reply="Current time is "+new Date().toLocaleTimeString();
else reply="I understand: "+input;

out.innerHTML+="<div>"+reply+"</div>";
}

/* ===== WINDOW ENGINE ===== */
function createWindow(title,content){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.closest('.window').remove()">✖</span>
</div>
<div class="content">${content}</div>
`;

document.body.appendChild(w);

/* drag */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=(e)=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=(e)=>{
if(!drag) return;
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
};

document.onmouseup=()=>drag=false;
}

</script>

</body>
</html>
