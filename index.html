<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diaries</title>
<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --card:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, var(--bg2), var(--bg1));
  color:white;
}

header{
  text-align:center;
  padding:30px;
  font-size:2.8rem;
  font-weight:bold;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

nav button{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:var(--card);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

nav button:hover{
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  transform:translateY(-2px);
}

.section{
  display:none;
  max-width:900px;
  margin:auto;
  padding:20px;
  animation:fade 0.3s ease;
}
.active{display:block;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);} to{opacity:1;}
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

textarea{
  width:100%;
  height:130px;
  border-radius:12px;
  border:none;
  padding:12px;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.entry{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  position:relative;
}

.entry::after{
  content:"✨";
  position:absolute;
  top:-8px;
  right:-8px;
}

.entry img{
  max-width:100%;
  border-radius:10px;
  margin-top:10px;
}

.lock-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.lock-box{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  text-align:center;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0.8);opacity:0;} to{transform:scale(1);opacity:1;}
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:10px;
}

.loading{
  display:none;
  font-size:1.5rem;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);} to{transform:rotate(360deg);}
}

.popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#ef4444;
  padding:15px;
  border-radius:10px;
  display:none;
}

.emoji-popup{
  position:absolute;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  display:none;
  max-height:200px;
  overflow:auto;
}

.emoji-popup span{
  padding:5px;
  cursor:pointer;
  font-size:18px;
}

footer{text-align:center;margin:30px;opacity:0.7;}
</style>
</head>
<body>

<div id="lock" class="lock-screen">
  <div class="lock-box">
    <h2>🔐 Secure Diary</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <br>
    <button class="btn" onclick="unlock()">Unlock</button>
    <div id="loading" class="loading">🔄</div>
  </div>
</div>

<div id="popup" class="popup">❌ Wrong Password</div>

<header>📔 Diaries</header>

<nav>
<button onclick="showSection('compose')">✍️ Compose</button>
<button onclick="showSection('past')">📜 Past Diaries</button>
<button onclick="showSection('about')">👤 About</button>
</nav>

<div id="compose" class="section active">
<div class="card">
<h2>Write Something ✨</h2>
<button onclick="toggleEmoji(event)">😊</button>
<button onclick="imgInput.click()">➕</button>
<input type="file" id="imgInput" style="display:none" onchange="addImage(event)">
<div id="emoji" class="emoji-popup"></div>
<textarea id="note"></textarea>
<button class="btn" onclick="saveNote()">Save</button>
</div>
</div>

<div id="past" class="section">
<h2>📜 Past Diaries</h2>
<input id="search" placeholder="Search..." oninput="displayNotes()">
<input type="date" id="dateFilter" onchange="displayNotes()">
<div id="entries"></div>
</div>

<div id="about" class="section">
<div class="card">
<h2>About Me</h2>
<p><b>Name:</b> Adhvik Mahesh</p>
<p><b>Grade:</b> 9</p>
<p><b>🚀 Curious Mind</b><br>Always learning, building and improving step by step. This diary captures growth and ideas.</p>
</div>
</div>

<footer>✨ Personal Diary App ✨</footer>

<script>
if(!localStorage.getItem("pass")) localStorage.setItem("pass","adhvik_diary");

function unlock(){
 let input=document.getElementById("pass").value;
 let correct=localStorage.getItem("pass");

 if(input===correct){
  document.getElementById("loading").style.display="block";
  setTimeout(()=>{
    document.getElementById("lock").style.display="none";
  },2000);
 } else {
  let p=document.getElementById("popup");
  p.style.display="block";
  setTimeout(()=>p.style.display="none",2000);
 }
}

const emojis="😄 😂 😍 😭 😎 🤯 🥳 🤩 😈 👻 💀 🔥 ✨ ⭐ ❤️ 💖 💯 👍 👎 🙌 👏 🧠 📚 🎯 🚀 🌙 ☕ 🎮 📱 🎧 ⚽ 🏆 🍕 🍩".split(" ");

function toggleEmoji(e){
 let box=document.getElementById("emoji");
 box.style.display=box.style.display==="block"?"none":"block";
 box.style.top=e.target.offsetTop+30+"px";
 box.style.left=e.target.offsetLeft+"px";
 box.innerHTML=emojis.map(em=>`<span onclick="addEmoji('${em}')">${em}</span>`).join("");
}

function addEmoji(e){document.getElementById("note").value+=e;}

function addImage(e){
 let r=new FileReader();
 r.onload=x=>document.getElementById("note").value+=`\n[img:${x.target.result}]`;
 r.readAsDataURL(e.target.files[0]);
}

function saveNote(){
 let t=document.getElementById("note").value;
 if(!t) return;
 let n=JSON.parse(localStorage.getItem("notes")||"[]");
 n.push({text:t,date:new Date().toLocaleDateString()});
 localStorage.setItem("notes",JSON.stringify(n));
 document.getElementById("note").value="";
 alert("Saved ✨");
}

function displayNotes(){
 let notes=JSON.parse(localStorage.getItem("notes")||"[]");
 let s=document.getElementById("search").value.toLowerCase();
 let d=document.getElementById("dateFilter").value;
 let c=document.getElementById("entries");
 c.innerHTML="";

 notes.slice().reverse().forEach((n,i)=>{
  if(s && !n.text.toLowerCase().includes(s)) return;
  if(d && n.date!==new Date(d).toLocaleDateString()) return;
  let t=n.text.replace(/\[img:(.*?)\]/g,'<img src="$1">');
  c.innerHTML+=`<div class='entry'><small>${n.date}</small><p>${t}</p></div>`;
 });
}

function showSection(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id==='past') displayNotes();
}
</script>

</body>
</html>
