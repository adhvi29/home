<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary Pro</title>
<style>
:root{
  --bg:#0b1220;
  --panel:rgba(17,24,39,0.9);
  --card:rgba(31,41,55,0.85);
  --accent:#6366f1;
}

body{
  margin:0;
  font-family:Segoe UI;
  color:white;
  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

/* APP */
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

.sidebar{
  background:var(--panel);
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--card);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.sidebar button:hover{transform:scale(1.03)}

.main{
  padding:20px;
  overflow:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.settings-btn{
  background:var(--card);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.settings{
  position:absolute;
  right:20px;
  top:60px;
  width:280px;
  background:var(--panel);
  padding:15px;
  border-radius:12px;
  display:none;
  animation:pop 0.2s ease;
}

@keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  animation:fade 0.3s;
}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:10px;
  padding:10px;
  background:rgba(0,0,0,0.3);
  color:white;
}

.btn{
  background:var(--accent);
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* EMOJI + ADD BUTTONS */
.tools{
  display:flex;
  gap:12px;
  margin-bottom:8px;
}
.tool{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}
.tool:hover{transform:scale(1.1)}

.emoji-popup{
  position:absolute;
  background:black;
  padding:10px;
  border-radius:10px;
  display:none;
  max-height:200px;
  overflow:auto;
}
.emoji-popup span{
  padding:5px;
  cursor:pointer;
  display:inline-block;
}

.entry{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  animation:fade 0.3s;
}

.entry-actions{
  display:flex;
  gap:10px;
  margin-top:8px;
}
.action{
  cursor:pointer;
  font-size:18px;
  transition:0.2s;
}
.action:hover{transform:scale(1.2)}

/* LOCKSCREEN (WINDOWS STYLE) */
.lock{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background-size:cover;
  background-position:center;
}
.lock::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.lock-box{
  position:relative;
  text-align:center;
  cursor:pointer;
  animation:fade 0.5s;
}
.lock input{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}
.eye{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}
.modal-box{
  background:var(--panel);
  padding:20px;
  border-radius:12px;
  text-align:center;
}

</style>
</head>
<body>

<!-- LOCKSCREEN -->
<div id="lock" class="lock" onclick="showLogin()">
  <div class="lock-box">
    <h1>Windows Lock</h1>
    <p>Click to unlock</p>
    <div style="position:relative">
      <input type="password" id="pass">
      <span class="eye" onclick="togglePass(event)">👁</span>
    </div>
    <button class="btn" onclick="unlock(event)">Enter</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-box" id="modalText"></div>
</div>

<div class="app">

<div class="sidebar">
<h2>📔 Diary</h2>
<button onclick="show('compose')">✍️ Compose</button>
<button onclick="show('past')">📜 Past</button>
<button onclick="show('about')">👤 About</button>
</div>

<div class="main">

<div class="topbar">
<h3 id="title">Compose</h3>
<div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</div>

<div id="settings" class="settings">
<h4>Settings</h4>
<label><input type="checkbox" id="autoBg"> Auto Background</label><br>
<input type="file" onchange="setBg(event)"><br>
<input type="password" id="newPass" placeholder="Change password">
<button class="btn" onclick="changePass()">Save</button>
</div>

<div id="compose" class="card">

<div class="tools">
<div class="tool" onclick="toggleEmoji()">😊</div>
<div class="tool" onclick="addImage()">➕</div>
</div>

<div id="emoji" class="emoji-popup"></div>
<textarea id="note"></textarea>
<button class="btn" onclick="save()">Save</button>
</div>

<div id="past" class="card" style="display:none">
<input id="search" placeholder="Search" oninput="display()">
<input type="date" id="dateFilter" onchange="display()">
<div id="entries"></div>
</div>

<div id="about" class="card" style="display:none">
<p>Adhvik Mahesh</p>
</div>

</div>
</div>

<script>
if(!localStorage.pass) localStorage.pass="adhvik_diary";

function showLogin(){
 document.querySelector('#pass').style.display='block';
}

function togglePass(e){
 e.stopPropagation();
 let p=document.getElementById('pass');
 p.type=p.type==='password'?'text':'password';
}

function unlock(e){
 e.stopPropagation();
 if(pass.value===localStorage.pass){lock.style.display='none'}
 else showModal("❌ Wrong Password")
}

function showModal(t){modalText.innerHTML=t;modal.style.display='flex'}
function closeModal(){modal.style.display='none'}

function toggleSettings(){settings.style.display=settings.style.display==='block'?'none':'block'}

function changePass(){localStorage.pass=newPass.value;showModal("Password Updated")}

// BACKGROUND
function setBg(e){
 let r=new FileReader();
 r.onload=x=>document.body.style.backgroundImage=`url(${x.target.result})`;
 r.readAsDataURL(e.target.files[0]);
}

// EMOJI
const emojis="😄😂😍😭😎🤯🥳🤩🔥✨❤️💯👍🙌📚🚀".split("");
function toggleEmoji(){
 let el=emoji;
 el.style.display=el.style.display==='block'?'none':'block';
 el.innerHTML=emojis.map(e=>`<span onclick="addEmoji('${e}')">${e}</span>`).join('');
}
function addEmoji(e){note.value+=e;emoji.style.display='none'}

// SAVE
function save(){
 let n=JSON.parse(localStorage.notes||"[]");
 n.push({text:note.value,date:new Date().toLocaleDateString()});
 localStorage.notes=JSON.stringify(n);
 note.value="";
}

// DISPLAY
function display(){
 let n=JSON.parse(localStorage.notes||"[]");
 let s=search.value?.toLowerCase()||"";
 let d=dateFilter.value;
 entries.innerHTML="";

 n.slice().reverse().forEach((e,i)=>{
  if(s && !e.text.toLowerCase().includes(s)) return;
  if(d && e.date!==new Date(d).toLocaleDateString()) return;

  entries.innerHTML+=`
  <div class='entry'>
    <small>${e.date}</small>
    <p contenteditable onblur="edit(${i},this.innerText)">${e.text}</p>
    <div class='entry-actions'>
      <span class='action' onclick="edit(${i},prompt('Edit',this.parentNode.parentNode.innerText))">✏️</span>
      <span class='action' onclick="confirmDel(${i})">🗑</span>
    </div>
  </div>`;
 });
}

function confirmDel(i){
 modalText.innerHTML=`Delete this entry? <br><br><button onclick="del(${i})" class='btn'>Yes</button>`;
 modal.style.display='flex';
}

function del(i){
 let n=JSON.parse(localStorage.notes);
 n.splice(i,1);
 localStorage.notes=JSON.stringify(n);
 closeModal();
 display();
}

function edit(i,text){let n=JSON.parse(localStorage.notes);n[i].text=text;localStorage.notes=JSON.stringify(n)}

function show(id){
 compose.style.display='none';
 past.style.display='none';
 about.style.display='none';
 document.getElementById(id).style.display='block';
 title.innerText=id;
 if(id==='past') display();
}

</script>
</body>
</html>
