<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diaries</title>
<style>
:root{
  --glass: rgba(255,255,255,0.08);
  --text: #fff;
}
*{box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  color:var(--text);
  background: linear-gradient(120deg,#0b0f1a,#1a1f3a);
  background-size:cover;
}

/* LOCKSCREEN (FIXED like Windows, with background) */
#lockscreen{
  position:fixed;inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80') center/cover;
  z-index:9999;
}

#overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
}

#lockContent{
  position:relative;
  text-align:center;
  animation:pop .4s ease;
}

#clock{font-size:60px;}
#date{opacity:0.8;margin-bottom:20px;}

#box{
  background:var(--glass);
  padding:20px;
  border-radius:15px;
  width:260px;
  backdrop-filter:blur(10px);
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  outline:none;
}

button{cursor:pointer;}

.eye{float:right;margin-top:-35px;margin-right:10px;cursor:pointer;}

@keyframes pop{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* APP */
#app{display:none;height:100vh;}
header{
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.4);
}

.container{
  display:grid;
  grid-template-columns:220px 1fr;
  height:calc(100vh - 50px);
}

.sidebar{
  background:rgba(0,0,0,0.3);
  padding:10px;
}

.sidebar button{
  width:100%;margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--glass);
  color:white;
}

.main{padding:15px;overflow:auto;}

.card{
  background:var(--glass);
  padding:10px;
  margin:10px 0;
  border-radius:12px;
}

.small{opacity:0.7;font-size:12px;}

#compose{display:none;}

#emojiBar button{
  margin:3px;
}

/* SETTINGS */
#settings{
  position:fixed;
  right:15px;top:60px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:12px;
  display:none;
}
</style>
</head>
<body>

<!-- LOCKSCREEN -->
<div id="lockscreen" onclick="showLogin()">
<div id="overlay"></div>

<div id="lockContent">
  <div id="clock"></div>
  <div id="date"></div>

  <div id="box" style="display:none">
    <h3>🔒 Diaries</h3>
    <input type="password" id="pass" placeholder="Password" />
    <span class="eye" onclick="togglePass()">👁</span>
    <button onclick="login()">Enter</button>
    <div id="err" style="color:red"></div>
  </div>
</div>
</div>

<!-- APP -->
<div id="app">
<header>
  <h3>📔 Diaries</h3>
  <button onclick="toggleSettings()">⚙️</button>
</header>

<div class="container">

<div class="sidebar">
  <button onclick="showCompose()">New Entry</button>
  <button onclick="showEntries()">Entries</button>
</div>

<div class="main">

<div id="compose">
  <textarea id="text" placeholder="Write your day..."></textarea>

  <div id="emojiBar">
    😊 😍 😭 🔥 💀 📚 🎮
  </div>

  <input id="tag" placeholder="Tag (school, life, etc)" />

  <button onclick="save()">Save</button>
</div>

<div id="entries"></div>

</div>
</div>
</div>

<script>
let password="adhvik_diary";

function updateTime(){
  let d=new Date();
  document.getElementById("clock").innerText=d.toLocaleTimeString();
  document.getElementById("date").innerText=d.toDateString();
}
setInterval(updateTime,1000);updateTime();

function showLogin(){
  document.getElementById("box").style.display="block";
}

function togglePass(){
  let p=document.getElementById("pass");
  p.type=p.type=="password"?"text":"password";
}

function login(){
  let p=document.getElementById("pass").value;
  if(p===password){
    document.getElementById("lockscreen").style.display="none";
    document.getElementById("app").style.display="block";
    showEntries();
  }else{
    document.getElementById("err").innerText="Wrong password";
  }
}

function showCompose(){
  document.getElementById("compose").style.display="block";
  document.getElementById("entries").style.display="none";
}

function showEntries(){
  document.getElementById("compose").style.display="none";
  document.getElementById("entries").style.display="block";

  let d=JSON.parse(localStorage.getItem("d")||"[]");
  let box=document.getElementById("entries");
  box.innerHTML="";

  d.reverse().forEach(e=>{
    box.innerHTML+=`
      <div class='card'>
        <div class='small'>${e.date} | ${e.tag||"no tag"}</div>
        <div>${e.text}</div>
      </div>`;
  });
}

function save(){
  let text=document.getElementById("text").value;
  let tag=document.getElementById("tag").value;

  let d=JSON.parse(localStorage.getItem("d")||"[]");
  d.push({text,tag,date:new Date().toLocaleString()});
  localStorage.setItem("d",JSON.stringify(d));

  document.getElementById("text").value="";
  document.getElementById("tag").value="";

  showEntries();
}
</script>

</body>
</html>
