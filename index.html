<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
html,body{height:100%;overflow:hidden;background:#000;color:#fff}

/* ===== BACKGROUND ENGINE (REWRITTEN) ===== */
.bg{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s ease, transform 20s linear;
z-index:-3;
}

#bg1{opacity:1}
#bg2{opacity:0}

/* blur overlay like Windows */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
z-index:-1;
}

/* ===== LOCKSCREEN (WINDOWS STYLE) ===== */
#lockscreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:rgba(0,0,0,0.4);
}

#time{
font-size:64px;
font-weight:300;
}

#date{
opacity:0.8;
margin-bottom:30px;
}

/* password box */
#loginBox{
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.08);
padding:10px 15px;
border-radius:12px;
backdrop-filter:blur(10px);
}

#pass{
background:transparent;
border:none;
outline:none;
color:white;
width:180px;
font-size:16px;
}

#eye{
cursor:pointer;
opacity:0.8;
}

/* ===== APP ===== */
#app{display:none;height:100%;flex-direction:column}

#topbar{
display:flex;
justify-content:space-between;
padding:10px 14px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
}

.tab{margin:0 6px;cursor:pointer;opacity:0.7}
.tab:hover{opacity:1}

#content{flex:1;overflow:auto;padding:15px}

/* WRITE */
textarea{
width:100%;
height:200px;
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.08);
color:white;
}

/* TOOLBAR */
.toolbar{
display:flex;
gap:8px;
margin-top:8px;
}

.toolbar button{
padding:8px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

/* SETTINGS */
#settings{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
padding:15px;
transition:0.4s;
}
#settings.open{right:0}

button{
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
margin:5px 0;
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.4s;
pointer-events:none;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="time"></div>
<div id="date"></div>

<div id="loginBox">
<input id="pass" type="password" placeholder="Password">
<span id="eye" onclick="toggleEye()">👁️</span>
<button onclick="unlock()">Enter</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="topbar">
<div>📔 Diary OS</div>
<div>
<span class="tab" onclick="show('write')">✍️</span>
<span class="tab" onclick="show('entries')">📜</span>
<span class="tab" onclick="toggleSettings()">⚙️</span>
</div>
</div>

<div id="content"></div>
</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="toggleMood()">Mood BG</button>
<button onclick="toggleRandom()">Random BG</button>
<button onclick="toggleAuto()">Auto BG</button>
</div>

<div id="toast"></div>

<script>

/* ===== PASSWORD (FIXED ALWAYS) ===== */
const PASSWORD="adhvik_diary";

/* ===== STATE ===== */
let entries=[];
let moodBG=true;
let randomBG=true;
let autoBG=true;

/* ===== CLOCK ===== */
function updateClock(){
let d=new Date();
time.innerText=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
date.innerText=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* ===== EYE BUTTON ===== */
function toggleEye(){
pass.type = pass.type==="password" ? "text":"password";
}

/* ===== TOAST (NO ALERT EVER) ===== */
function toast(msg){
toastBox.innerText=msg;
toastBox.style.opacity=1;
setTimeout(()=>toastBox.style.opacity=0,2000);
}

/* ===== UNLOCK ===== */
function unlock(){
if(pass.value===PASSWORD){
lockscreen.style.display="none";
app.style.display="flex";
show("write");
toast("Unlocked");
}else{
toast("Wrong password");
}
}

/* ===== BACKGROUND ENGINE (FIXED CORE) ===== */
let current=1;

function setBg(url){
let next=current===1?bg2:bg1;
let prev=current===1?bg1:bg2;

next.style.backgroundImage=`url(${url})`;
next.style.opacity=1;
prev.style.opacity=0;

current=current===1?2:1;
}

/* AUTO BG */
setInterval(()=>{
if(!autoBG) return;
if(randomBG){
setBg(`https://picsum.photos/1920/1080?random=${Math.random()}`);
}
},8000);

/* MOOD BG */
function moodToBg(text){
if(!moodBG) return null;
if(/happy/i.test(text)) return "https://picsum.photos/1920/1080?happy";
if(/sad/i.test(text)) return "https://picsum.photos/1920/1080?sad";
return null;
}

/* ===== UI ===== */
function show(tab){

if(tab==="write"){
content.innerHTML=`
<textarea id="txt"></textarea>

<div class="toolbar">
<button onclick="save()">Save</button>
<button onclick="toast('Emoji ready')">😊</button>
<button onclick="toast('Image ready')">➕</button>
</div>
`;
}

if(tab==="entries"){
content.innerHTML=entries.map(e=>`
<div style="padding:10px;margin:10px 0;background:rgba(255,255,255,0.06);border-radius:10px">
${e.text}<br><small>${e.date}</small>
</div>
`).join("");
}

if(tab==="settings"){
settings.classList.toggle("open");
}
}

/* ===== SAVE ===== */
function save(){
let t=txt.value;
entries.push({text:t,date:new Date().toLocaleString()});

let bg=moodToBg(t);
if(bg) setBg(bg);

toast("Saved");
show("entries");
}

/* ===== SETTINGS ===== */
function toggleSettings(){
settings.classList.toggle("open");
}

function toggleMood(){
moodBG=!moodBG;
toast("Mood BG toggled");
}

function toggleRandom(){
randomBG=!randomBG;
toast("Random BG toggled");
}

function toggleAuto(){
autoBG=!autoBG;
toast("Auto BG toggled");
}

</script>

</body>
</html>
