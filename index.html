<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
color:white;
}

/* ===== LOCKSCREEN ===== */
#lockscreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

#time{
font-size:50px;
margin-bottom:20px;
}

input{
padding:10px;
font-size:18px;
}

/* ===== DESKTOP ===== */
#desktop{
display:none;
height:100vh;
width:100vw;
position:relative;
}

/* wallpapers */
#bg1,#bg2{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s;
}

#bg2{opacity:0}

/* taskbar */
#bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:50px;
background:#111;
display:flex;
gap:10px;
align-items:center;
padding:0 10px;
z-index:1000;
}

/* windows */
.win{
position:absolute;
width:300px;
background:#222;
border:1px solid #444;
}

.bar{
background:#333;
padding:5px;
display:flex;
justify-content:space-between;
cursor:move;
}

.body{
padding:10px;
}

/* emoji */
#emoji{
position:fixed;
bottom:60px;
right:10px;
background:#000a;
padding:10px;
display:grid;
grid-template-columns:repeat(5,1fr);
}

</style>
</head>

<body>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="time"></div>
<input id="pass" type="password" placeholder="Enter password">
<button onclick="unlock()">Unlock</button>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div id="bg1"></div>
<div id="bg2"></div>

<div id="bar">
<button onclick="newDiary()">📔 New</button>
<button onclick="openPrev()">📁 Diaries</button>
<button onclick="openSearch()">🔍 Search</button>
<button onclick="openSettings()">⚙️ Settings</button>
</div>

</div>

<script>

/* ================= LOCKSCREEN ================= */

let PASSWORD="1234";

function updateTime(){
document.getElementById("time").innerText=new Date().toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function unlock(){
let p=document.getElementById("pass").value;
if(p===PASSWORD){
document.getElementById("lockscreen").style.display="none";
document.getElementById("desktop").style.display="block";
startWallpaper();
}
}

/* ================= WALLPAPER ================= */

let wallpapers=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let wp=true;

function startWallpaper(){
setInterval(()=>{
if(!wp)return;

let img=wallpapers[Math.floor(Math.random()*wallpapers.length)];
bg2.style.backgroundImage=`url(${img})`;
bg2.style.opacity=1;
bg1.style.opacity=0;

setTimeout(()=>{
bg1.style.backgroundImage=bg2.style.backgroundImage;
bg1.style.opacity=1;
bg2.style.opacity=0;
},1000);

},10000);
}

/* ================= WINDOW SYSTEM ================= */

let z=10;

function win(title,html){
let w=document.createElement("div");
w.className="win";
w.style.zIndex=z++;

w.innerHTML=`
<div class="bar">
<span>${title}</span>
<span onclick="this.parentElement.parentElement.remove()">✖</span>
</div>
<div class="body">${html}</div>
`;

document.body.appendChild(w);

/* drag */
let drag=false,ox,oy;

w.querySelector(".bar").onmousedown=e=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=e=>{
if(drag){
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=false;

return w;
}

/* ================= DATABASE ================= */

let db;
let req=indexedDB.open("DiaryOS",1);

req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("diaries",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>db=e.target.result;

/* ================= SAVE DIARY ================= */

function saveDiary(text,imgs){
let tx=db.transaction("diaries","readwrite");
tx.objectStore("diaries").add({
text,
imgs,
date:new Date().toISOString()
});
}

/* ================= NEW DIARY ================= */

let currentImgs=[];

function newDiary(){

currentImgs=[];

win("New Diary",`
<textarea id="t" style="width:100%;height:150px"></textarea><br>
<button onclick="addImg()">➕ Image</button>
<button onclick="emoji(t)">😊 Emoji</button>
<button onclick="saveDiary(t.value,currentImgs)">💾 Save</button>
<div id="preview"></div>
`);

}

/* image upload */
function addImg(){
let i=document.createElement("input");
i.type="file";
i.onchange=e=>{
for(let f of e.target.files){
let url=URL.createObjectURL(f);
currentImgs.push(url);
document.getElementById("preview").innerHTML+=`<img src="${url}" width="80">`;
}
};
i.click();
}

/* ================= PREVIOUS DIARIES ================= */

function openPrev(){

let tx=db.transaction("diaries","readonly");
let st=tx.objectStore("diaries");

let html="<h3>Previous Diaries</h3>";

st.openCursor().onsuccess=e=>{
let c=e.target.result;
if(c){
html+=`<div onclick="view(${c.key})" style="padding:5px;border:1px solid #555;margin:5px;cursor:pointer">${c.value.text.slice(0,40)}</div>`;
c.continue();
}else{
win("Diaries",html);
}
};

}

function view(id){
let tx=db.transaction("diaries","readonly");
let st=tx.objectStore("diaries");

st.get(id).onsuccess=e=>{
let d=e.target.result;
win("View",`<p>${d.text}</p>${(d.imgs||[]).map(i=>`<img src="${i}" width="120">`).join("")}`);
};
}

/* ================= SEARCH + CALENDAR ================= */

function openSearch(){

win("Search + Calendar",`
<input id="q">
<button onclick="search(q.value)">Search</button>
<div id="r"></div>
`);

window.search=function(q){
let tx=db.transaction("diaries","readonly");
let st=tx.objectStore("diaries");

let out=document.getElementById("r");
out.innerHTML="";

st.openCursor().onsuccess=e=>{
let c=e.target.result;
if(c){
if(c.value.text.toLowerCase().includes(q.toLowerCase())){
out.innerHTML+=`<div style="margin:5px;border:1px solid #555">${c.value.text.slice(0,50)}</div>`;
}
c.continue();
}
};
};

}

/* ================= EMOJI ================= */

function emoji(t){
let emojis=["😀","😂","😍","😭","🔥","❤️","👍"];

let box=document.createElement("div");
box.id="emoji";

box.innerHTML="";

emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>t.value+=e;
box.appendChild(s);
});

document.body.appendChild(box);
}

/* ================= SETTINGS ================= */

function openSettings(){
win("Settings",`
<button onclick="wp=!wp">Toggle Wallpaper</button>
<button onclick="indexedDB.deleteDatabase('DiaryOS')">Reset Data</button>
`);
}

</script>

</body>
</html>
