<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary OS Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
html,body{height:100%;overflow:hidden;background:#000;color:#fff}

/* ================= BACKGROUND (FIXED CORE) ================= */
.bg{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.5s ease;
z-index:-10;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
z-index:-1;
}

/* ================= TOOLTIP SYSTEM ================= */
.tooltip{
position:absolute;
background:rgba(0,0,0,0.85);
color:white;
padding:6px 10px;
border-radius:8px;
font-size:12px;
pointer-events:none;
opacity:0;
transition:0.2s;
z-index:99999;
}

/* ================= LOCKSCREEN ================= */
#lockscreen{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
z-index:1000;
}

#time{font-size:65px;font-weight:300}
#date{opacity:0.8}

#loginBox{
display:flex;
gap:8px;
align-items:center;
background:rgba(255,255,255,0.08);
padding:10px 15px;
border-radius:12px;
backdrop-filter:blur(10px);
}

#pass{
background:transparent;
border:none;
outline:none;
color:white;
width:180px;
}

/* ================= APP ================= */
#app{
display:none;
height:100%;
flex-direction:column;
position:relative;
z-index:10;
}

/* ================= TASKBAR ================= */
#taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
gap:18px;
z-index:20;
}

.icon{
width:42px;
height:42px;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
position:relative;
}
.icon:hover{background:rgba(255,255,255,0.15)}

/* ================= START MENU ================= */
#startMenu{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:300px;
background:rgba(25,25,25,0.85);
backdrop-filter:blur(25px);
border-radius:14px;
padding:12px;
display:none;
flex-direction:column;
gap:8px;
z-index:30;
}

/* ================= SETTINGS ================= */
#settings{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(20px);
padding:15px;
transition:0.4s;
z-index:50;
}
#settings.open{right:0}

/* ================= WRITE MODAL ================= */
#writeModal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
z-index:40;
}

#writeBox{
width:60%;
max-width:700px;
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
display:flex;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:200px;
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

/* toolbar */
.toolbar{
display:flex;
gap:8px;
}

.btn{
padding:8px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

/* ================= TOAST ================= */
#toast{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.75);
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.3s;
pointer-events:none;
z-index:9999;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- TOOLTIP -->
<div id="tooltip" class="tooltip"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="time"></div>
<div id="date"></div>

<div id="loginBox">
<input id="pass" type="password" placeholder="Password">
<span class="btn" onclick="togglePass()">👁</span>
<button onclick="unlock()">Enter</button>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- START MENU -->
<div id="startMenu">
<button onclick="openWrite()">📝 Write</button>
<button onclick="toggleSettings()">⚙️ Settings</button>
<button onclick="toast('System running')">ℹ️ Info</button>
</div>

<!-- TASKBAR -->
<div id="taskbar">

<div class="icon" onmouseenter="tip(event,'Start Menu')" onmouseleave="hideTip()" onclick="toggleStart()">⊞</div>

<div class="icon" onmouseenter="tip(event,'Write Diary')" onmouseleave="hideTip()" onclick="openWrite()">✍️</div>

<div class="icon" onmouseenter="tip(event,'Settings')" onmouseleave="hideTip()" onclick="toggleSettings()">⚙️</div>

</div>

</div>

<!-- WRITE MODAL -->
<div id="writeModal">
<div id="writeBox">

<textarea id="txt"></textarea>

<div class="toolbar">
<button class="btn" onmouseenter="tip(event,'Save Entry')" onmouseleave="hideTip()" onclick="save()">💾</button>
<button class="btn" onmouseenter="tip(event,'Insert Emoji')" onmouseleave="hideTip()" onclick="toast('Emoji Picker')">😊</button>
<button class="btn" onmouseenter="tip(event,'Upload File')" onmouseleave="hideTip()" onclick="toast('File Picker')">➕</button>
<button class="btn" onmouseenter="tip(event,'Close Editor')" onmouseleave="hideTip()" onclick="closeWrite()">❌</button>
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="toast('Mood BG toggled')">Mood BG</button>
<button onclick="toast('Auto BG toggled')">Auto BG</button>
<button onclick="closeSettings()">❌ Close</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

/* ================= CORE ================= */
const PASSWORD="adhvik_diary";

/* ================= STATE ================= */
let cur=1;

/* ================= CLOCK ================= */
function updateClock(){
let d=new Date();
time.innerText=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
date.innerText=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

/* ================= TOOLTIP ================= */
function tip(e,text){
tooltip.innerText=text;
tooltip.style.opacity=1;
tooltip.style.left=e.pageX+10+"px";
tooltip.style.top=e.pageY+10+"px";
}
function hideTip(){
tooltip.style.opacity=0;
}

/* ================= TOAST ================= */
function toast(msg){
toast.innerText=msg;
toast.style.opacity=1;
setTimeout(()=>toast.style.opacity=0,2000);
}

/* ================= PASSWORD ================= */
function togglePass(){
pass.type = pass.type==="password"?"text":"password";
}

function unlock(){
if(pass.value===PASSWORD){
lockscreen.style.display="none";
app.style.display="flex";
toast("Welcome");
}else toast("Wrong password");
}

/* ================= BACKGROUND FIXED ================= */
function setBg(url){
let next=cur===1?bg2:bg1;
let prev=cur===1?bg1:bg2;

next.style.backgroundImage=`url(${url})`;
next.style.opacity=1;
prev.style.opacity=0;

cur=cur===1?2:1;
}

/* startup changing BG */
setInterval(()=>{
setBg(`https://images.unsplash.com/photo-1501785888041-af3ef285b470?${Math.random()}`);
},8000);

/* ================= START MENU ================= */
let startOpen=false;

function toggleStart(){
startOpen=!startOpen;
startMenu.style.display=startOpen?"flex":"none";
}

/* ================= SETTINGS ================= */
function toggleSettings(){
settings.classList.toggle("open");
}

function closeSettings(){
settings.classList.remove("open");
}

/* ================= WRITE MODAL ================= */
let writeOpen=false;

function openWrite(){
writeOpen=true;
writeModal.style.display="flex";
}

function closeWrite(){
writeOpen=false;
writeModal.style.display="none";
txt.value="";
}

function save(){
toast("Saved");
closeWrite();
}

/* ================= SAFETY ================= */
window.onclick=function(e){
if(e.target===writeModal) closeWrite();
}

</script>

</body>
</html>
