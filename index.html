<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diaries</title>
<style>
:root{
  --glass: rgba(255,255,255,0.08);
  --text:#fff;
}
*{box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  color:var(--text);
  background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

/* LOCKSCREEN */
#lockscreen{
  position:fixed;inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.45);
  backdrop-filter: blur(0px);
  transition:0.6s ease;
  z-index:9999;
}

#lockscreen.active{
  backdrop-filter: blur(18px);
}

#lockContent{
  text-align:center;
  transition:0.5s ease;
}

#clock{
  font-size:64px;
  transition:0.4s ease;
}

#date{
  opacity:0.8;
  margin-bottom:20px;
  transition:0.4s ease;
}

#lockscreen.active #clock,
#lockscreen.active #date{
  opacity:0;
  transform:translateY(-20px);
}

#box{
  background:var(--glass);
  padding:20px;
  border-radius:15px;
  width:260px;
  display:none;
  backdrop-filter:blur(10px);
  animation:pop .4s ease;
}

#lockscreen.active #box{
  display:block;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

.eye{
  position:absolute;
  right:15px;
  top:18px;
  cursor:pointer;
}

button{cursor:pointer;}

@keyframes pop{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* APP */
#app{
  display:none;
  height:100vh;
}

header{
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.35);
}

.container{
  display:grid;
  grid-template-columns:220px 1fr;
  height:calc(100vh - 50px);
}

.sidebar{
  background:rgba(0,0,0,0.25);
  padding:10px;
}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--glass);
  color:white;
}

.main{
  padding:15px;
  overflow:auto;
}

.card{
  background:var(--glass);
  padding:10px;
  margin:10px 0;
  border-radius:12px;
}

.small{opacity:0.7;font-size:12px;}

#compose{display:none;}

#search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

</style>
</head>
<body>

<!-- LOCKSCREEN -->
<div id="lockscreen" onclick="activateLock()">
  <div id="lockContent">
    <div id="clock"></div>
    <div id="date"></div>

    <div id="box" onclick="event.stopPropagation()">
      <h3>🔒 Diaries</h3>
      <div style="position:relative">
        <input type="password" id="pass" placeholder="Password" />
        <span class="eye" onclick="togglePass()">👁</span>
      </div>
      <button onclick="login()">Enter</button>
      <div id="err" style="color:red"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
<header>
  <h3>📔 Diaries</h3>
  <button onclick="lockAgain()">🔒</button>
</header>

<div class="container">
  <div class="sidebar">
    <button onclick="newEntry()">New Entry</button>
    <button onclick="showEntries()">Timeline</button>
  </div>

  <div class="main">

    <div id="compose">
      <textarea id="text" placeholder="Start writing..."></textarea>
      <input id="tag" placeholder="tag (optional)" />
      <button onclick="save()">Save</button>
    </div>

    <input id="search" placeholder="Search entries..." oninput="filter()" />

    <div id="entries"></div>

  </div>
</div>
</div>

<script>
let password="adhvik_diary";
let unlocked=false;

function updateClock(){
  let d=new Date();
  document.getElementById("clock").innerText=d.toLocaleTimeString();
  document.getElementById("date").innerText=d.toDateString();
}
setInterval(updateClock,1000);
updateClock();

function activateLock(){
  document.getElementById("lockscreen").classList.add("active");
}

function togglePass(){
  let p=document.getElementById("pass");
  p.type=p.type==="password"?"text":"password";
}

function login(){
  let p=document.getElementById("pass").value;
  if(p===password){
    unlocked=true;
    document.getElementById("lockscreen").style.display="none";
    document.getElementById("app").style.display="block";
    newEntry();
  }else{
    document.getElementById("err").innerText="Wrong password";
  }
}

function lockAgain(){
  document.getElementById("app").style.display="none";
  document.getElementById("lockscreen").style.display="flex";
  document.getElementById("lockscreen").classList.remove("active");
}

function newEntry(){
  document.getElementById("compose").style.display="block";
  document.getElementById("entries").style.display="none";
}

function save(){
  let text=document.getElementById("text").value;
  let tag=document.getElementById("tag").value;

  let d=JSON.parse(localStorage.getItem("d")||"[]");
  d.push({text,tag,date:new Date().toLocaleString()});
  localStorage.setItem("d",JSON.stringify(d));

  document.getElementById("text").value="";
  document.getElementById("tag").value="";

  showEntries();
}

function showEntries(){
  document.getElementById("compose").style.display="none";
  document.getElementById("entries").style.display="block";

  let d=JSON.parse(localStorage.getItem("d")||"[]");
  let box=document.getElementById("entries");
  box.innerHTML="";

  d.slice().reverse().forEach(e=>{
    box.innerHTML+=`
      <div class='card'>
        <div class='small'>${e.date} ${e.tag?"| "+e.tag:""}</div>
        <div>${e.text}</div>
      </div>`;
  });
}

function filter(){
  let q=document.getElementById("search").value.toLowerCase();
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(q)?"block":"none";
  });
}
</script>

</body>
</html>
