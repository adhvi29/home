<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS v2</title>
<style>
*{margin:0;padding:0;font-family:Segoe UI;box-sizing:border-box}
body{overflow:hidden;background:#000;color:#fff}

/* ===== BACKGROUND ENGINE ===== */
.bg{
 position:fixed;inset:0;
 background-size:cover;
 background-position:center;
 transition:opacity 1s;
}
#bg1{opacity:1}
#bg2{opacity:0}
.overlay{
 position:fixed;inset:0;
 background:rgba(0,0,0,0.35);
 backdrop-filter:blur(12px);
}

/* ===== LOCKSCREEN ===== */
#lock{
 position:fixed;inset:0;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 gap:10px;
 z-index:9999;
 cursor:pointer;
}
#lockBox{
 background:rgba(0,0,0,0.4);
 padding:20px;
 border-radius:15px;
 text-align:center;
 backdrop-filter:blur(20px);
 animation:fadeIn 1s;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

/* ===== LOGIN ===== */
#login{
 display:none;
 margin-top:10px;
 gap:10px;
}
input{
 background:rgba(255,255,255,0.1);
 border:none;
 color:white;
 padding:8px;
 border-radius:8px;
 outline:none;
}

/* ===== TOP BAR ===== */
#topbar{
 position:fixed;
 top:0;left:0;right:0;
 height:40px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 10px;
 background:rgba(0,0,0,0.5);
 backdrop-filter:blur(20px);
 z-index:1000;
}
.topbtn{cursor:pointer;padding:5px 10px;border-radius:8px}
.topbtn:hover{background:rgba(255,255,255,0.1)}

/* ===== START MENU ===== */
#startMenu{
 position:fixed;
 bottom:50px;left:10px;
 width:220px;
 background:rgba(0,0,0,0.7);
 backdrop-filter:blur(20px);
 border-radius:12px;
 display:none;
 padding:10px;
 z-index:1000;
}

/* ===== WINDOW SYSTEM ===== */
.window{
 position:absolute;
 width:320px;height:300px;
 background:rgba(20,20,20,0.9);
 backdrop-filter:blur(20px);
 border-radius:12px;
 overflow:hidden;
 animation:pop .2s ease;
}
@keyframes pop{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}

.titlebar{
 background:rgba(255,255,255,0.1);
 padding:6px;
 display:flex;
 justify-content:space-between;
 cursor:grab;
}

.content{padding:10px;height:100%}

/* ===== TASKBAR ===== */
#taskbar{
 position:fixed;
 bottom:0;left:0;right:0;
 height:45px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(20px);
 display:flex;
 justify-content:center;
 align-items:center;
 gap:10px;
}

/* ===== DIARY ===== */
textarea{
 width:100%;
 height:150px;
 background:rgba(255,255,255,0.08);
 border:none;
 color:white;
 padding:10px;
 border-radius:10px;
}

button{
 background:rgba(255,255,255,0.1);
 border:none;
 padding:6px;
 border-radius:8px;
 color:white;
 cursor:pointer;
}

</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lock">
 <div id="lockBox">
   <h1 id="clock"></h1>
   <p>Click to unlock</p>

   <div id="login">
     <input id="user" placeholder="User">
     <input id="pass" type="password" placeholder="Password">
     <button onclick="login()">Unlock</button>
   </div>
 </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
 <div>
  <span class="topbtn" onclick="newDiary()">＋ New</span>
  <span class="topbtn" onclick="toggleStart()">🪟 Start</span>
 </div>
 <div>
  <span class="topbtn" onclick="toggleSettings()">⚙ Settings</span>
 </div>
</div>

<!-- START MENU -->
<div id="startMenu">
 <div onclick="openDiary()">📓 New Diary</div>
 <div onclick="openPrev()">📂 Previous Diaries</div>
 <div onclick="openSearch()">🔍 Search</div>
 <div onclick="openCalendar()">📅 Calendar</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
 <span>Diary OS v2</span>
</div>

<script>

/* ===== BACKGROUND ENGINE ===== */
const bgs=[
 "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
 "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
 "https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let cur=0;
function setBG(){
 let next = cur%2?bg1:bg2;
 let prev = cur%2?bg2:bg1;
 next.style.backgroundImage=`url(${bgs[Math.floor(Math.random()*bgs.length)]})`;
 next.style.opacity=1;
 prev.style.opacity=0;
 cur++;
}
setBG();

/* refresh changes bg */
setInterval(setBG,15000);

/* ===== CLOCK ===== */
function updateClock(){
 document.getElementById("clock").innerText=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* ===== LOCK FLOW ===== */
let unlocked=false;

document.getElementById("lock").onclick=()=>{
 document.getElementById("login").style.display="flex";
};

function login(){
 let u=user.value;
 let p=pass.value;
 if(u.length>0 && p.length>0){
   document.getElementById("lock").style.display="none";
   unlocked=true;
 } else alert("Enter credentials");
}

/* ===== WINDOWS ===== */
let z=10;
function createWindow(title,html){
 let w=document.createElement("div");
 w.className="window";
 w.style.top="100px";
 w.style.left="100px";
 w.style.zIndex=z++;

 w.innerHTML=`
 <div class="titlebar">
 <span>${title}</span>
 <span onclick="this.parentNode.parentNode.remove()">✖</span>
 </div>
 <div class="content">${html}</div>
 `;

 document.body.appendChild(w);

 let drag=false,ox,oy;
 w.querySelector(".titlebar").onmousedown=(e)=>{
  drag=true;
  ox=e.clientX-w.offsetLeft;
  oy=e.clientY-w.offsetTop;
 };

 document.onmousemove=(e)=>{
  if(drag){
    w.style.left=(e.clientX-ox)+"px";
    w.style.top=(e.clientY-oy)+"px";
  }
 };

 document.onmouseup=()=>drag=false;
 return w;
}

/* ===== DIARY STORAGE (IndexedDB SIMPLE) ===== */
let db;
let req=indexedDB.open("DiaryOS",1);

req.onupgradeneeded=e=>{
 db=e.target.result;
 db.createObjectStore("diaries",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>db=e.target.result;

function saveDiary(text){
 let tx=db.transaction("diaries","readwrite");
 tx.objectStore("diaries").add({
  text,
  date:new Date().toISOString()
 });
}

/* ===== APPS ===== */
function newDiary(){
 createWindow("New Diary",`
 <textarea id="t"></textarea>
 <button onclick="saveDiary(t.value)">💾 Save</button>
 <button onclick="alert('😊 Emoji system')">😊</button>
 <input type="file" onchange="handleFile(this.files)">
 `);
}

function openPrev(){
 createWindow("Previous Diaries",`<p>Stored diaries in IndexedDB (basic)</p>`);
}

function openSearch(){
 createWindow("Search",`
 <input id="s" placeholder="Search diary...">
 <button onclick="alert('Search feature active')">Search</button>
 `);
}

function openCalendar(){
 createWindow("Calendar","<p>Calendar timeline placeholder</p>");
}

/* FILE DROP */
function handleFile(f){
 alert("File added: "+f[0].name);
}

/* ===== START MENU ===== */
function toggleStart(){
 startMenu.style.display=startMenu.style.display==="block"?"none":"block";
}

/* ===== SETTINGS ===== */
function toggleSettings(){
 alert("Settings panel (expandable)");
}

</script>
</body>
</html>
