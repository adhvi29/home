<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS v6</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:black;color:white}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s ease, filter 0.5s ease;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* ===== LOCK (FIRST STATE CLEAN) ===== */
#lock{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
cursor:pointer;
}

#timeOnly{
font-size:60px;
font-weight:300;
text-shadow:0 0 20px black;
}

#login{
display:none;
flex-direction:column;
gap:10px;
padding:20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
border-radius:12px;
}

input{
padding:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
width:220px;
}

.eye{
cursor:pointer;
position:absolute;
right:15px;
top:12px;
}

/* ===== TOPBAR ===== */
#topbar{
position:fixed;
top:0;left:0;right:0;
height:42px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
z-index:1000;
}

.btn{cursor:pointer;padding:6px 10px;border-radius:8px}
.btn:hover{background:rgba(255,255,255,0.1)}

/* ===== WINDOW ===== */
.window{
position:absolute;
width:360px;
height:340px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
border-radius:12px;
overflow:hidden;
animation:pop .15s ease;
}

@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

.titlebar{
background:rgba(255,255,255,0.1);
padding:6px;
display:flex;
justify-content:space-between;
cursor:grab;
}

/* ===== CONTENT ===== */
.content{padding:10px;height:100%;overflow:auto}

textarea{
width:100%;
height:120px;
background:rgba(255,255,255,0.08);
border:none;
color:white;
border-radius:10px;
padding:10px;
}

button{
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:6px;
border-radius:8px;
cursor:pointer;
}

/* ===== EMOJI PANEL ===== */
#emojiPanel{
position:fixed;
bottom:60px;
right:10px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
padding:10px;
border-radius:10px;
display:none;
grid-template-columns:repeat(5,1fr);
gap:5px;
z-index:2000;
}

#emojiPanel span{cursor:pointer}

/* ===== SETTINGS ===== */
#settings{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
transition:0.3s;
z-index:2000;
padding:10px;
}

#settings.open{right:0}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<!-- LOCK SCREEN -->
<div id="lock">
  <div id="timeOnly"></div>

  <div id="login">
    <div style="position:relative">
      <input id="pass" type="password" placeholder="Password">
      <span class="eye" onclick="togglePass()">👁</span>
    </div>
    <button onclick="login()">Unlock</button>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
 <div>
  <span class="btn" onclick="newDiary()">＋ New</span>
  <span class="btn" onclick="toggleEmoji()">😊</span>
 </div>
 <div>
  <span class="btn" onclick="toggleSettings()">⚙</span>
 </div>
</div>

<!-- SETTINGS -->
<div id="settings">
 <h3>Settings</h3>
 <button onclick="toggleWallpaper()">Toggle Wallpaper</button>
 <button onclick="clearData()">Reset Data</button>
</div>

<!-- EMOJI -->
<div id="emojiPanel"></div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

/* ===== WALLPAPERS ===== */
const walls=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let bgIndex=0;
let wallpaperOn=true;

/* LIVE WALLPAPER ENGINE */
function setBG(){
if(!wallpaperOn) return;

let a=bg1;
let b=bg2;

b.style.backgroundImage=`url(${walls[Math.floor(Math.random()*walls.length)]})`;
b.style.opacity=1;
a.style.opacity=0;

setTimeout(()=>{
a.style.backgroundImage=b.style.backgroundImage;
a.style.opacity=1;
b.style.opacity=0;
},800);
}

setBG();
setInterval(setBG,10000);

/* ===== LOCK FLOW ===== */
const lock=document.getElementById("lock");
const timeOnly=document.getElementById("timeOnly");
const loginBox=document.getElementById("login");

setInterval(()=>{
timeOnly.innerText=new Date().toLocaleTimeString();
},1000);

/* click reveals password */
lock.onclick=()=>{
loginBox.style.display="flex";
timeOnly.style.display="none";
};

/* ===== PASSWORD ===== */
const PASSWORD="adhvik_diary";

window.login=function(){
if(pass.value===PASSWORD){
lock.style.display="none";
}else alert("Wrong password");
};

window.togglePass=function(){
pass.type = pass.type==="password"?"text":"password";
};

/* ===== WINDOW SYSTEM ===== */
let z=10;

window.win=function(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.parentNode.parentNode.remove()">✖</span>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);

/* DRAG */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=e=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=e=>{
if(drag){
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=false;

/* SNAP */
w.onmousedown=()=>{
if(w.offsetLeft<20) w.style.left="0px";
if(w.offsetLeft>window.innerWidth-380) w.style.left=(window.innerWidth-380)+"px";
if(w.offsetTop<20) w.style.top="0px";
};

return w;
};

/* ===== DIARY STORAGE (ENCRYPTED SIMPLE) ===== */
function encrypt(t){
return btoa(unescape(encodeURIComponent(t)));
}

/* ===== APPS ===== */
window.newDiary=()=>{
win("New Diary",`
<textarea id="d"></textarea>
<button onclick="save(d.value)">💾 Save</button>
<button onclick="toggleEmoji(d)">😊 Emoji</button>
<input type="file" onchange="addImage(this.files,d)">
`);
};

window.save=function(text){
localStorage.setItem(Date.now(),encrypt(text));
alert("Saved securely");
};

window.addImage=function(files,box){
let f=files[0];
let url=URL.createObjectURL(f);
box.value+="\n[image:"+url+"]";
};

/* ===== EMOJI SYSTEM ===== */
const emojis=["😀","😂","😍","😭","😡","👍","🔥","❤️","🎉"];

window.toggleEmoji=function(target){
let panel=document.getElementById("emojiPanel");
panel.style.display=panel.style.display==="grid"?"none":"grid";

panel.innerHTML="";
emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>{
target.value+=e;
};
panel.appendChild(s);
});
};

/* ===== SETTINGS ===== */
window.toggleSettings=()=>{
settings.classList.toggle("open");
};

window.toggleWallpaper=()=>{
wallpaperOn=!wallpaperOn;
};

window.clearData=()=>{
localStorage.clear();
alert("Reset done");
};

});

</script>

</body>
</html>
