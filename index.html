<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diary OS</title>

<style>
body {
margin: 0;
font-family: Arial;
overflow: hidden;
color: white;
background: black;
}

/* 💻 BOOT SCREEN */
#boot {
position: fixed;
inset: 0;
background: black;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 1000;
transition: opacity 0.8s ease;
}

#bootTitle {
font-size: 60px;
opacity: 0.9;
}

/* loading dots */
.dots {
display: flex;
gap: 6px;
margin-top: 20px;
}

.dot {
width: 10px;
height: 10px;
background: white;
border-radius: 50%;
animation: bounce 1s infinite ease-in-out;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
0%,100% { transform: translateY(0); opacity: 0.4; }
50% { transform: translateY(-10px); opacity: 1; }
}

/* 🌄 BACKGROUND */
#bg {
position: fixed;
inset: 0;
background-size: cover;
background-position: center;
animation: zoom 20s infinite alternate ease-in-out;
z-index: 0;
}

@keyframes zoom {
from { transform: scale(1); }
to { transform: scale(1.1); }
}

/* 🌫 OVERLAY */
#overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.25);
backdrop-filter: blur(0px);
transition: 0.4s;
z-index: 1;
}

/* 🫧 LOCK SCREEN */
#glass {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 3;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px 28px;
border-radius: 18px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(18px);
text-align: center;
opacity: 0;
transition: opacity 1s ease;
}

#clock {
font-size: 80px;
font-weight: 300;
}

#date {
font-size: 14px;
opacity: 0.9;
}

#learnMore {
font-size: 12px;
color: #9fd3ff;
cursor: pointer;
}

/* 🔐 LOGIN */
#loginBox {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;
display: none;
justify-content: center;
align-items: center;
}

#loginInner {
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
padding: 20px;
border-radius: 16px;
background: rgba(0,0,0,0.45);
backdrop-filter: blur(18px);
}

/* INPUT */
input {
border: none;
outline: none;
background: #fff;
color: #111;
width: 180px;
text-align: center;
padding: 8px;
border-radius: 10px;
}

/* SHAKE */
@keyframes shake {
0% { transform: translateX(0); }
20% { transform: translateX(-6px); }
40% { transform: translateX(6px); }
60% { transform: translateX(-4px); }
80% { transform: translateX(4px); }
100% { transform: translateX(0); }
}

.shake {
animation: shake 0.35s ease;
}

/* 🌊 RIPPLE */
.ripple {
position: fixed;
top: 50%;
left: 50%;
width: 10px;
height: 10px;
background: rgba(255,255,255,0.2);
border-radius: 50%;
transform: translate(-50%, -50%);
animation: ripple 0.6s ease-out;
z-index: 20;
}

@keyframes ripple {
from { width: 10px; height: 10px; opacity: 1; }
to { width: 600px; height: 600px; opacity: 0; }
}

/* 🪟 WINDOWS POPUP */
#popup {
position: fixed;
top: 50%;
left: 50%;
width: 320px;
min-width: 220px;
min-height: 120px;
transform: translate(-50%, -50%);
background: rgba(20,20,20,0.92);
border-radius: 12px;
backdrop-filter: blur(20px);
z-index: 999;
display: none;
flex-direction: column;
overflow: hidden;
}

/* HEADER */
#popupHeader {
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 10px;
background: rgba(255,255,255,0.08);
cursor: move;
user-select: none;
}

#windowControls span {
margin-left: 8px;
cursor: pointer;
opacity: 0.8;
}

#windowControls span:hover {
opacity: 1;
}

/* BODY */
#popupBody {
padding: 12px;
}

/* RESIZE */
#resizeHandle {
width: 14px;
height: 14px;
position: absolute;
right: 2px;
bottom: 2px;
cursor: nwse-resize;
background: rgba(255,255,255,0.3);
border-radius: 3px;
}

/* TASKBAR */
#taskbar {
position: fixed;
bottom: 10px;
left: 10px;
z-index: 1000;
}

#taskBtn {
padding: 6px 10px;
border: none;
border-radius: 8px;
cursor: pointer;
}
</style>
</head>

<body>

<!-- 💻 BOOT -->
<div id="boot">
<div id="bootTitle">Diary OS</div>
<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>

<div id="bg"></div>
<div id="overlay"></div>

<!-- LOCK -->
<div id="glass">
<div id="clock"></div>
<div id="date"></div>
<div id="learnMore">Learn more</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<div id="loginInner">
<input type="password" id="pw" placeholder="Password">
<span onclick="toggle()">👁️</span>
<button onclick="unlock()">Unlock</button>
<div id="status"></div>
</div>
</div>

<!-- 🪟 POPUP WINDOW -->
<div id="popup">
<div id="popupHeader">
<div>Spotlight Fact</div>
<div id="windowControls">
<span onclick="minimizePopup()">➖</span>
<span onclick="closePopup()">✖</span>
</div>
</div>
<div id="popupBody">
<p id="popupText"></p>
</div>
<div id="resizeHandle"></div>
</div>

<!-- 📌 TASKBAR -->
<div id="taskbar">
<button id="taskBtn" onclick="restorePopup()">📦 Fact</button>
</div>

<script>
let locked = true;

/* WALLPAPERS */
const wallpapers = [
{ url: "https://picsum.photos/id/1015/1920/1080", fact: "Mountains are formed by tectonic plates." },
{ url: "https://picsum.photos/id/1016/1920/1080", fact: "Water covers 71% of Earth." },
{ url: "https://picsum.photos/id/1025/1920/1080", fact: "Dogs understand emotions." }
];

let pick = wallpapers[Math.floor(Math.random() * wallpapers.length)];
document.getElementById("bg").style.backgroundImage = `url(${pick.url})`;

/* CLOCK */
function updateTime() {
const d = new Date();
document.getElementById("clock").innerText =
d.getHours().toString().padStart(2,'0') + ":" +
d.getMinutes().toString().padStart(2,'0');
document.getElementById("date").innerText = d.toDateString();
}

setInterval(updateTime, 1000);
updateTime();

/* 💻 BOOT SEQUENCE */
window.addEventListener("load", () => {
setTimeout(() => {
document.getElementById("boot").style.opacity = "0";
setTimeout(() => {
document.getElementById("boot").style.display = "none";
document.getElementById("glass").style.opacity = "1";
}, 800);
}, 2500);
});

/* LOGIN FLOW */
document.body.addEventListener("click", (e) => {
if (!locked) return;
if (e.target.closest("#loginBox") || e.target.closest("#popup")) return;

document.getElementById("glass").style.display = "none";
document.getElementById("loginBox").style.display = "flex";
document.getElementById("overlay").style.backdropFilter = "blur(12px)";
});

/* UNLOCK */
function unlock() {
const pw = document.getElementById("pw");
const status = document.getElementById("status");
const box = document.getElementById("loginInner");

if (pw.value === "1234") {
status.innerText = "Logging in...";
setTimeout(() => {
locked = false;
document.getElementById("loginBox").style.display = "none";
document.getElementById("overlay").style.backdropFilter = "0px";
}, 600);
} else {
status.innerText = "Wrong password";
box.classList.remove("shake");
void box.offsetWidth;
box.classList.add("shake");
createRipple();
}
}

/* RIPPLE */
function createRipple() {
const ripple = document.createElement("div");
ripple.className = "ripple";
document.body.appendChild(ripple);
setTimeout(() => ripple.remove(), 600);
}

/* TOGGLE PASSWORD */
function toggle() {
const p = document.getElementById("pw");
p.type = p.type === "password" ? "text" : "password";
}

/* 🪟 POPUP SYSTEM */
const popup = document.getElementById("popup");
const header = document.getElementById("popupHeader");

document.getElementById("learnMore").addEventListener("click", (e) => {
e.stopPropagation();
popup.style.display = "flex";
document.getElementById("popupText").innerText = pick.fact;
});

/* CLOSE */
function closePopup() {
popup.style.display = "none";
}

/* MINIMIZE */
function minimizePopup() {
popup.style.display = "none";
}

/* RESTORE */
function restorePopup() {
popup.style.display = "flex";
}

/* DRAG */
let drag = false;
let offsetX, offsetY;

header.addEventListener("mousedown", (e) => {
drag = true;
offsetX = e.clientX - popup.offsetLeft;
offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mousemove", (e) => {
if (drag) {
popup.style.left = (e.clientX - offsetX) + "px";
popup.style.top = (e.clientY - offsetY) + "px";
popup.style.transform = "none";
}
});

document.addEventListener("mouseup", () => {
drag = false;
});

/* RESIZE */
const resize = document.getElementById("resizeHandle");
let resizing = false;

resize.addEventListener("mousedown", () => resizing = true);

document.addEventListener("mousemove", (e) => {
if (resizing) {
popup.style.width = (e.clientX - popup.offsetLeft) + "px";
popup.style.height = (e.clientY - popup.offsetTop) + "px";
}
});

document.addEventListener("mouseup", () => resizing = false);
</script>

</body>
</html>
