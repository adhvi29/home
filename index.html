<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:#000;color:white}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 0.8s ease;
z-index:-5;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* overlay */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
z-index:-1;
}

/* ===== LOCKSCREEN ===== */
#lockscreen{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

#clock{font-size:70px;font-weight:200}

#login{
display:flex;
gap:10px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:12px;
}

input,textarea{
background:rgba(255,255,255,0.08);
border:none;
color:white;
outline:none;
padding:8px;
border-radius:8px;
}

/* ===== DESKTOP ===== */
#desktop{display:none;height:100vh}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
padding:8px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

.icon{
cursor:pointer;
padding:6px;
border-radius:8px;
position:relative;
}

.icon:hover{background:rgba(255,255,255,0.1)}

/* tooltip */
.icon:hover::after{
content:attr(data-tip);
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:black;
padding:5px;
border-radius:6px;
font-size:12px;
}

/* ===== WINDOW SYSTEM ===== */
.window{
position:absolute;
width:360px;
height:340px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
animation:pop 0.2s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.titlebar{
display:flex;
justify-content:space-between;
padding:6px;
background:rgba(255,255,255,0.08);
cursor:grab;
}

.content{
flex:1;
display:flex;
flex-direction:column;
padding:8px;
gap:6px;
}

/* ===== SETTINGS ===== */
#settings{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
transition:0.3s;
padding:10px;
z-index:999;
}
#settings.open{right:0}

/* NOTIFICATIONS */
#notif{
position:fixed;
top:10px;
right:10px;
display:flex;
flex-direction:column;
gap:5px;
z-index:9999;
}
.toast{
background:rgba(0,0,0,0.7);
padding:8px;
border-radius:8px;
animation:fade 3s forwards;
}
@keyframes fade{0%{opacity:1}100%{opacity:0}}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- NOTIFICATIONS -->
<div id="notif"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div id="clock"></div>

<div id="login">
<input id="pass" type="password" placeholder="Password">
<span onclick="togglePass()" style="cursor:pointer">👁️</span>
<button onclick="login()">Enter</button>
</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div id="taskbar">

<div>
<span class="icon" data-tip="Diary" onclick="openDiary()">📔</span>
<span class="icon" data-tip="AI" onclick="openAI()">🧠</span>
<span class="icon" data-tip="Settings" onclick="toggleSettings()">⚙️</span>
</div>

<div>
<span class="icon">🪟</span>
</div>

</div>

</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>
<button onclick="changeBG()">Change BG</button>
<button onclick="toggleAI()">AI Mode</button>
</div>

<script>

/* ===== PASSWORD ===== */
const PASSWORD="adhvik_diary";

/* ===== BACKGROUND (INSTANT) ===== */
const imgs=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

function setBG(url){
bg2.style.backgroundImage=`url(${url})`;
bg2.style.opacity=1;
bg1.style.opacity=0;

setTimeout(()=>{
bg1.style.backgroundImage=`url(${url})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
},800);
}

setBG(imgs[Math.floor(Math.random()*imgs.length)]);

/* ===== CLOCK ===== */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* ===== LOGIN ===== */
function togglePass(){
pass.type=pass.type==="password"?"text":"password";
}

function login(){
if(pass.value===PASSWORD){
lockscreen.style.display="none";
desktop.style.display="block";
notify("Welcome back 👋");
}else notify("Wrong password");
}

/* ===== NOTIFICATIONS ===== */
function notify(msg){
let n=document.createElement("div");
n.className="toast";
n.innerText=msg;
notif.appendChild(n);
setTimeout(()=>n.remove(),3000);
}

/* ===== SETTINGS ===== */
let aiEnabled=true;

function toggleSettings(){
settings.classList.toggle("open");
}

function changeBG(){
setBG(imgs[Math.floor(Math.random()*imgs.length)]);
notify("Background changed");
}

function toggleAI(){
aiEnabled=!aiEnabled;
notify("AI: "+aiEnabled);
}

/* ===== WINDOW ENGINE ===== */
let z=10;

function win(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.closest('.window').remove()">✖</span>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);

/* drag */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=(e)=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
w.style.zIndex=z++;
};

document.onmousemove=(e)=>{
if(!drag) return;
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
};

document.onmouseup=()=>drag=false;

return w;
}

/* ===== DIARY (INDEXEDDB READY HOOK) ===== */
function openDiary(){
win("Diary",`
<textarea id="diaryBox" placeholder="Write..."></textarea>
<div>
<button onclick="saveDiary()">💾 Save</button>
<button onclick="notify('Emoji')">😊</button>
<button onclick="notify('Files')">➕</button>
</div>
`);
}

function saveDiary(){
let text=document.getElementById("diaryBox").value;
localStorage.setItem("diary",text);
notify("Saved locally (IndexedDB upgrade ready)");
}

/* ===== AI SYSTEM ===== */
function openAI(){
win("AI Assistant",`
<textarea id="aiInput" placeholder="Ask AI... (Enter to send, Shift+Enter new line)"></textarea>
<div>
<button onclick="sendAI()">Send</button>
</div>
<div id="aiOut"></div>
`);

let box=document.getElementById("aiInput");

box.addEventListener("keydown",(e)=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendAI();
}
});
}

/* MOCK AI + API READY */
async function sendAI(){
let input=document.getElementById("aiInput").value;
let out=document.getElementById("aiOut");

if(!aiEnabled){
notify("AI disabled");
return;
}

/* MOCK RESPONSE (replace with OpenAI API later) */
let reply="🤖 AI: You said -> "+input;

out.innerHTML+="<p>"+reply+"</p>";
document.getElementById("aiInput").value="";
}

/* ===== STARTUP ===== */
notify("Diary OS Loaded");

</script>

</body>
</html>
