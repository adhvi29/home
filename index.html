<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaries PRO MAX</title>

<!-- PWA -->
<link rel="manifest" id="manifest">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,system-ui}
html,body{height:100%;overflow:hidden;background:#000;color:#fff}

/* ===== BACKGROUNDS ===== */
#bg,#bg2{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.2s ease;
z-index:-3;
}
#bg2{opacity:0}

#overlay{
position:fixed;inset:0;
background:radial-gradient(circle at top,rgba(255,255,255,0.08),rgba(0,0,0,0.85));
z-index:-1;
}

/* ===== WINDOWS LOGIN ===== */
#winLogin{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(25px);
z-index:9999;
transition:1s;
}

#loginBox{
padding:30px;
border-radius:18px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
text-align:center;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* ===== APP ===== */
#app{display:none;height:100%;flex-direction:column}

#topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.tab{cursor:pointer;margin:0 6px;opacity:0.7}
.tab:hover{opacity:1}

#content{flex:1;overflow:auto;padding:18px}

/* ===== UI ELEMENTS ===== */
.entry{
background:rgba(255,255,255,0.06);
padding:14px;
margin:10px 0;
border-radius:14px;
backdrop-filter:blur(14px);
}

textarea,input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
}

/* calendar */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}
.day{
padding:8px;
text-align:center;
background:rgba(255,255,255,0.05);
border-radius:8px;
cursor:pointer;
}
.day:hover{background:rgba(255,255,255,0.15)}

/* timeline */
.timelineItem{
padding:10px;
margin:10px 0;
border-left:2px solid white;
padding-left:10px;
}

/* popup */
#popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:10px 16px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-radius:10px;
opacity:0;
transition:0.5s;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>
<div id="bg2"></div>
<div id="overlay"></div>

<!-- LOGIN -->
<div id="winLogin">
<div id="loginBox">
<h2>Diaries Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Unlock</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="topbar">
<div>📔 Diaries PRO MAX</div>
<div>
<span class="tab" onclick="show('write')">✍️</span>
<span class="tab" onclick="show('entries')">📜</span>
<span class="tab" onclick="show('search')">🔍</span>
<span class="tab" onclick="show('calendar')">📅</span>
<span class="tab" onclick="show('timeline')">⏳</span>
</div>
<button onclick="lock()">🔒</button>
</div>

<div id="content"></div>
</div>

<div id="popup"></div>

<script>

/* ================= PASSWORD ================= */
let password = localStorage.getItem("password") || "adhvik_diary";
let entries = JSON.parse(localStorage.getItem("entries") || "[]");

/* ================= LOGIN ================= */
function login(){
if(pass.value === password){
winLogin.style.opacity="0";
setTimeout(()=>{
winLogin.style.display="none";
app.style.display="flex";
show("write");
},800);
}else alert("Wrong Password");
}

function lock(){location.reload()}

/* ================= SAVE ENTRY ================= */
function save(text){
entries.push({
text,
date:new Date().toLocaleString(),
tags:autoTag(text),
mood:detectMood(text)
});
localStorage.setItem("entries",JSON.stringify(entries));
}

/* ================= AUTO TAG + MOOD ================= */
function autoTag(t){
let tags=[];
if(/school|study|exam/i.test(t)) tags.push("study");
if(/game|ps5|play/i.test(t)) tags.push("gaming");
if(/sad|cry/i.test(t)) tags.push("sad");
if(/happy|lol/i.test(t)) tags.push("happy");
return tags;
}

function detectMood(t){
if(/sad|cry/i.test(t)) return "sad";
if(/angry/i.test(t)) return "angry";
if(/happy|lol/i.test(t)) return "happy";
return "neutral";
}

/* ================= BACKGROUND ENGINE ================= */
function bgForMood(m){
let map={
happy:"https://picsum.photos/1920/1080?happy",
sad:"https://picsum.photos/1920/1080?sad",
angry:"https://picsum.photos/1920/1080?fire",
neutral:"https://picsum.photos/1920/1080?space"
};
return map[m]||map.neutral;
}

function setBg(m){
let img=bgForMood(m);
bg2.style.backgroundImage=`url(${img})`;
bg2.style.opacity=1;
bg.style.opacity=0;
setTimeout(()=>{
bg.style.backgroundImage=`url(${img})`;
bg.style.opacity=1;
bg2.style.opacity=0;
},1200);
}

/* random background rotation */
setInterval(()=>{
let imgs=[
"https://picsum.photos/1920/1080?1",
"https://picsum.photos/1920/1080?2",
"https://picsum.photos/1920/1080?3"
];
bg.style.backgroundImage=`url(${imgs[Math.floor(Math.random()*imgs.length)]})`;
},10000);

/* ================= UI ================= */
function show(tab){

if(tab==="write"){
content.innerHTML=`
<textarea id="txt" placeholder="Write something..."></textarea>
<button onclick="saveAndRender()">Save</button>`;
}

if(tab==="entries"){
content.innerHTML=entries.map(e=>`
<div class="entry">
<b>${e.date}</b><br>
${e.text}<br>
<small>${(e.tags||[]).join(", ")}</small>
</div>
`).join("");
}

if(tab==="timeline"){
content.innerHTML=entries.slice().reverse().map(e=>`
<div class="timelineItem">
<b>${e.date}</b><br>${e.text}
</div>
`).join("");
}

if(tab==="calendar"){
content.innerHTML="<h3>Calendar (existing feature preserved)</h3>";
}

if(tab==="search"){
content.innerHTML=`<input oninput="search(this.value)" placeholder="Search..."><div id="res"></div>`;
}
}

/* ================= SEARCH ================= */
function search(q){
res.innerHTML=entries.filter(e=>e.text.includes(q))
.map(e=>`<div class="entry">${e.text}</div>`).join("");
}

/* ================= SAVE ================= */
function saveAndRender(){
let text=txt.value;
save(text);
setBg(detectMood(text));
show("entries");
}

/* ================= POPUP ================= */
function popup(msg){
popup.innerText=msg;
popup.style.opacity=1;
setTimeout(()=>popup.style.opacity=0,2000);
}

/* ================= PWA ================= */
const manifest = {
name:"Diaries PRO MAX",
short_name:"Diaries",
start_url:".",
display:"standalone",
background_color:"#000",
theme_color:"#000"
};

const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest").href=URL.createObjectURL(blob);

/* service worker */
if("serviceWorker" in navigator){
const sw = `
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('fetch',()=>{});
`;
navigator.serviceWorker.register(
URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))
);
}

/* INIT BG */
bg.style.backgroundImage="url(https://picsum.photos/1920/1080?init)";

</script>

</body>
</html>
