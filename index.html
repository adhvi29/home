<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diaries</title>
<style>
:root{--bg1:#1e1e2f;--bg2:#2b2b45;--card:rgba(255,255,255,0.08);--accent:#7aa2ff;}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:white;}
header{text-align:center;padding:25px;font-size:2.5rem;font-weight:bold;}
nav{display:flex;justify-content:center;gap:10px;margin:10px;flex-wrap:wrap;}
nav button{padding:10px 15px;border:none;border-radius:999px;background:var(--card);color:white;cursor:pointer;}
.section{display:none;padding:20px;max-width:900px;margin:auto;}
.active{display:block;}
.card{background:var(--card);padding:15px;border-radius:15px;}
textarea{width:100%;height:120px;border-radius:10px;border:none;padding:10px;}
.btn{padding:8px 12px;border:none;border-radius:8px;background:var(--accent);color:white;cursor:pointer;}
.entry{background:var(--card);padding:10px;border-radius:10px;margin:10px 0;}
.entry img{max-width:100%;border-radius:10px;margin-top:8px;}
.emoji-popup{position:absolute;background:#2b2b45;padding:10px;border-radius:10px;display:none;max-width:300px;max-height:200px;overflow-y:auto;}
.emoji-popup span{cursor:pointer;padding:4px;font-size:18px;display:inline-block;}
input{padding:8px;border-radius:8px;border:none;margin:5px;}
.lock-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;flex-direction:column;}
</style>
</head>
<body>

<div id="lock" class="lock-screen">
<h2>🔐 Enter Password</h2>
<input type="password" id="pass">
<button class="btn" onclick="unlock()">Enter</button>
</div>

<header>📔 Diaries</header>

<nav>
<button onclick="showSection('compose')">Compose</button>
<button onclick="showSection('view')">View</button>
<button onclick="showSection('about')">About</button>
</nav>

<div id="compose" class="section active">
<div class="card">
<h2>New Entry</h2>
<button onclick="toggleEmoji(event)">😊</button>
<button onclick="imgInput.click()">➕ Image</button>
<input type="file" id="imgInput" style="display:none" onchange="addImage(event)">
<div id="emoji" class="emoji-popup"></div>
<textarea id="note"></textarea>
<button class="btn" onclick="saveNote()">Save</button>
</div>
</div>

<div id="view" class="section">
<h2>Entries</h2>
<input type="text" id="search" placeholder="Search..." oninput="displayNotes()">
<input type="date" id="dateFilter" onchange="displayNotes()">
<div id="entries"></div>
</div>

<div id="about" class="section">
<div class="card">
<h2>About Me</h2>
<p><b>Name:</b> Adhvik Mahesh</p>
<p><b>Grade:</b> 9</p>
<p><b>🚀 Curious Mind, Growing Journey</b><br>
A student who enjoys learning, experimenting, and improving step by step. Always exploring ideas and building things while growing every day.</p>
</div>
</div>

<script>
// PASSWORD
if(!localStorage.getItem("pass")) localStorage.setItem("pass","adhvik_diary");
function unlock(){
 if(document.getElementById("pass").value===localStorage.getItem("pass")){
  document.getElementById("lock").style.display="none";
 } else alert("Wrong password");
}

// BIG EMOJI LIST
const emojiList = "😄 😂 😍 😭 😎 😡 🤯 🥶 😴 🤔 🫠 🥳 🤩 🥺 😈 👻 💀 🔥 ✨ ⭐ 🌟 💫 ⚡ ❤️ 💔 💖 💯 👍 👎 🙌 👏 🤝 🙏 🧠 📚 ✏️ 📝 🎯 🚀 🌙 ☀️ 🌧️ ⛈️ 🌈 🍔 🍕 🍟 🍜 🍩 🍫 ☕ 🎮 🖥️ 📱 🎧 🎵 🎶 ⚽ 🏀 🏆 🥇".split(" ");

function toggleEmoji(e){
 let box=document.getElementById("emoji");
 box.style.display=box.style.display==="block"?"none":"block";
 box.style.top=e.target.offsetTop+30+"px";
 box.style.left=e.target.offsetLeft+"px";
 box.innerHTML = emojiList.map(em=>`<span onclick="addEmoji('${em}')">${em}</span>`).join("");
}

function addEmoji(e){document.getElementById("note").value+=e;}

// IMAGE
function addImage(e){
 let reader=new FileReader();
 reader.onload=x=>document.getElementById("note").value+=`\n[img:${x.target.result}]`;
 reader.readAsDataURL(e.target.files[0]);
}

// SAVE
function saveNote(){
 let text=document.getElementById("note").value;
 if(!text) return;
 let notes=JSON.parse(localStorage.getItem("notes")||"[]");
 notes.push({text,date:new Date().toLocaleDateString()});
 localStorage.setItem("notes",JSON.stringify(notes));
 document.getElementById("note").value="";
 alert("Saved");
}

// DISPLAY
function displayNotes(){
 let notes=JSON.parse(localStorage.getItem("notes")||"[]");
 let s=document.getElementById("search").value.toLowerCase();
 let d=document.getElementById("dateFilter").value;
 let c=document.getElementById("entries");
 c.innerHTML="";
 notes.slice().reverse().forEach((n,i)=>{
  if(s && !n.text.toLowerCase().includes(s)) return;
  if(d && n.date!==new Date(d).toLocaleDateString()) return;
  let t=n.text.replace(/\[img:(.*?)\]/g,'<img src="$1">');
  c.innerHTML+=`<div class='entry'><small>${n.date}</small><p>${t}</p></div>`;
 });
}

// NAV
function showSection(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id==='view') displayNotes();
}
</script>

</body>
</html>
