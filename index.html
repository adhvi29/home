<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS Ultra</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:black;color:white}

/* ===== BACKGROUND ENGINE (INSTANT, NO DELAY) ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 0.8s ease;
z-index:-5;
}
#bg1{opacity:1}
#bg2{opacity:0}

/* overlay */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(20px);
z-index:-1;
}

/* ===== LOCKSCREEN ===== */
#lockscreen{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:rgba(0,0,0,0.3);
transition:0.6s ease;
}

#clock{
font-size:70px;
font-weight:200;
animation:fadeIn 1s ease;
}

#hint{
opacity:0.7;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* login panel hidden first */
#loginPanel{
display:none;
flex-direction:column;
gap:10px;
align-items:center;
}

input{
background:rgba(255,255,255,0.1);
border:none;
padding:10px;
border-radius:10px;
color:white;
outline:none;
}

/* ===== DESKTOP ===== */
#desktop{
display:none;
height:100vh;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
padding:8px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(25px);
z-index:100;
}

.icon{
cursor:pointer;
padding:8px;
border-radius:10px;
transition:0.2s;
position:relative;
}

.icon:hover{background:rgba(255,255,255,0.1)}

.icon:hover::after{
content:attr(data-tip);
position:absolute;
bottom:45px;
left:50%;
transform:translateX(-50%);
background:black;
padding:5px;
border-radius:6px;
font-size:12px;
white-space:nowrap;
}

/* ===== START MENU ===== */
#startMenu{
position:fixed;
bottom:60px;
left:10px;
width:260px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
border-radius:12px;
padding:10px;
display:none;
z-index:200;
}

/* ===== WINDOWS ===== */
.window{
position:absolute;
width:320px;
height:320px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
animation:pop 0.2s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.titlebar{
display:flex;
justify-content:space-between;
padding:6px;
background:rgba(255,255,255,0.08);
cursor:grab;
}

.close{cursor:pointer}

/* ===== TEXTBOX ===== */
textarea{
flex:1;
background:rgba(255,255,255,0.08);
border:none;
color:white;
padding:10px;
resize:none;
outline:none;
}

.tools{
display:flex;
gap:6px;
padding:6px;
}

.tools button{
background:rgba(255,255,255,0.1);
border:none;
padding:6px;
border-radius:8px;
cursor:pointer;
}

/* ===== ANIMATION FX ===== */
.fadeIn{animation:fadeIn 0.5s ease}

</style>
</head>

<body>

<!-- BACKGROUND (INSTANT LOAD) -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen" onclick="showLogin()">
<div id="clock"></div>
<div id="hint">Click anywhere to unlock</div>

<div id="loginPanel">
<div>
<input id="pass" type="password" placeholder="Password">
<span onclick="togglePass()" style="cursor:pointer">👁️</span>
</div>
<button onclick="login()">Enter</button>
</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- TASKBAR -->
<div id="taskbar">

<div>
<span class="icon" data-tip="Start" onclick="toggleStart()">🪟</span>
<span class="icon" data-tip="Search" onclick="openSearch()">🔍</span>
<span class="icon" data-tip="Diary" onclick="openApp()">📔</span>
</div>

<div>
<span class="icon" data-tip="Settings" onclick="alert('Settings')">⚙️</span>
</div>

</div>

<!-- START MENU -->
<div id="startMenu">
<p onclick="openApp()">📔 Diary</p>
<p onclick="openExplorer()">📁 File Explorer</p>
<p onclick="openAI()">🧠 AI Assistant</p>
</div>

</div>

<script>

/* ===== INSTANT BACKGROUND (NO DELAY) ===== */
const images=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

function setBG(url){
bg2.style.backgroundImage=`url(${url})`;
bg2.style.opacity=1;
bg1.style.opacity=0;

setTimeout(()=>{
bg1.style.backgroundImage=`url(${url})`;
bg1.style.opacity=1;
bg2.style.opacity=0;
},800);
}

/* RANDOM ON REFRESH */
setBG(images[Math.floor(Math.random()*images.length)]);

/* ===== CLOCK ===== */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* ===== LOCK FLOW ===== */
function showLogin(){
loginPanel.style.display="flex";
hint.style.display="none";
}

function togglePass(){
pass.type=pass.type==="password"?"text":"password";
}

function login(){
if(pass.value==="adhvik_diary"){
lockscreen.style.display="none";
desktop.style.display="block";
}else alert("Wrong password");
}

/* ===== START MENU ===== */
function toggleStart(){
startMenu.style.display=
startMenu.style.display==="block"?"none":"block";
}

/* ===== WINDOW SYSTEM ===== */
let z=10;

function createWindow(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.closest('.window').remove()">✖</span>
</div>
<div class="content" style="flex:1;display:flex;flex-direction:column">${html}</div>
`;

document.body.appendChild(w);

/* drag */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=(e)=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
w.style.zIndex=z++;
};

document.onmousemove=(e)=>{
if(!drag) return;
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
};

document.onmouseup=()=>drag=false;

return w;
}

/* ===== APPS ===== */
function openApp(){
createWindow("Diary",`
<textarea id="t"></textarea>
<div class="tools">
<button onclick="save()">💾 Save</button>
<button>😊</button>
<button>➕</button>
</div>
`);
}

function openExplorer(){
createWindow("File Explorer",`
<p>📁 Drag & Drop files (future upgrade)</p>
`);
}

function openAI(){
createWindow("AI Assistant",`
<textarea placeholder="Ask AI..."></textarea>
`);
}

/* ===== SAVE (future IndexedDB hook) ===== */
function save(){
alert("Saved (DB system ready for upgrade)");
}

</script>

</body>
</html>
