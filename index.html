<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaries PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
html,body{height:100%;overflow:hidden;background:#000;color:#fff}

/* BACKGROUND */
#bg,#bg2{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s ease;
z-index:-3;
}
#bg2{opacity:0}

#overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* LOGIN */
#login{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
}

#box{
padding:25px;
border-radius:15px;
background:rgba(255,255,255,0.06);
text-align:center;
}

/* APP */
#app{display:none;height:100%;flex-direction:column}

#topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
}

.tab{margin:0 6px;cursor:pointer;opacity:0.7}
.tab:hover{opacity:1}

#content{flex:1;overflow:auto;padding:15px}

/* ENTRY */
.entry{
background:rgba(255,255,255,0.06);
padding:12px;
margin:8px 0;
border-radius:12px;
}

/* WRITE */
.writeBox{display:flex;flex-direction:column;gap:10px}
textarea{
width:100%;
height:200px;
border:none;
border-radius:12px;
padding:10px;
background:rgba(255,255,255,0.08);
color:white;
}

.toolbar{
display:flex;
gap:8px;
}

.toolbar button{
padding:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

/* SETTINGS */
#settings{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
padding:15px;
transition:0.4s;
}
#settings.open{right:0}

button{
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
margin:5px 0;
}

/* POPUP (IN-WEBSITE TOAST) */
#popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.4s;
pointer-events:none;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="bg2"></div>
<div id="overlay"></div>

<!-- LOGIN -->
<div id="login">
<div id="box">
<h3>Login</h3>
<input type="password" id="pass" placeholder="Password"><br><br>
<button onclick="login()">Unlock</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="topbar">
<div>📔 Diaries</div>
<div>
<span class="tab" onclick="show('write')">✍️</span>
<span class="tab" onclick="show('entries')">📜</span>
<span class="tab" onclick="show('settings')">⚙️</span>
</div>
</div>

<div id="content"></div>
</div>

<!-- SETTINGS -->
<div id="settings">
<h3>Settings</h3>

<button onclick="toggleMood()">Mood BG: ON/OFF</button>
<button onclick="toggleRandom()">Random BG: ON/OFF</button>
<button onclick="toggleAuto()">Auto BG: ON/OFF</button>
</div>

<div id="popup"></div>

<script>

/* CORE */
let password="adhvik_ai";
let entries=[];

/* BG SETTINGS */
let moodBG=true;
let randomBG=true;
let autoBG=true;

/* POPUP (NO ALERTS EVER) */
function toast(msg){
popup.innerText=msg;
popup.style.opacity=1;
setTimeout(()=>popup.style.opacity=0,2000);
}

/* LOGIN */
function login(){
if(pass.value===password){
login.style.display="none";
app.style.display="flex";
show("write");
toast("Unlocked");
}else{
toast("Wrong password");
}
}

/* SAVE */
function save(text){
entries.push({text,date:new Date().toLocaleString()});
}

/* BACKGROUND */
function setBg(img){
bg2.style.backgroundImage=`url(${img})`;
bg2.style.opacity=1;
bg.style.opacity=0;

setTimeout(()=>{
bg.style.backgroundImage=`url(${img})`;
bg.style.opacity=1;
bg2.style.opacity=0;
},800);
}

/* MOOD BG */
function moodToBg(t){
if(!moodBG) return null;
if(/happy/i.test(t)) return "https://picsum.photos/1920/1080?happy";
if(/sad/i.test(t)) return "https://picsum.photos/1920/1080?sad";
return "https://picsum.photos/1920/1080?default";
}

/* AUTO BG */
setInterval(()=>{
if(!autoBG) return;
if(randomBG){
setBg(`https://picsum.photos/1920/1080?rand=${Math.random()}`);
}
},8000);

/* UI */
function show(tab){

if(tab==="write"){
content.innerHTML=`
<div class="writeBox">
<textarea id="txt"></textarea>

<div class="toolbar">
<button onclick="saveNow()">Save</button>
<button onclick="toast('Emoji ready')">😊</button>
<button onclick="toast('Image ready')">➕</button>
</div>
</div>
`;
}

if(tab==="entries"){
content.innerHTML=entries.map(e=>`
<div class="entry">${e.text}<br><small>${e.date}</small></div>
`).join("");
}

if(tab==="settings"){
settings.classList.toggle("open");
}
}

/* SAVE */
function saveNow(){
let t=txt.value;
save(t);
toast("Saved");

let bg=moodToBg(t);
if(bg) setBg(bg);

show("entries");
}

/* SETTINGS TOGGLES */
function toggleMood(){
moodBG=!moodBG;
toast("Mood BG toggled");
}

function toggleRandom(){
randomBG=!randomBG;
toast("Random BG toggled");
}

function toggleAuto(){
autoBG=!autoBG;
toast("Auto BG toggled");
}

</script>

</body>
</html>
