<script>

document.addEventListener("DOMContentLoaded", () => {

/* =========================
   SAFE INIT GUARD
========================= */

function safe(fn){
try { fn(); } catch(e){ console.log("DiaryOS error:", e); }
}

/* =========================
   ELEMENT CHECK
========================= */

const bg1 = window.bg1 || document.getElementById("bg1");
const bg2 = window.bg2 || document.getElementById("bg2");

/* =========================
   WAIT FOR DB READY
========================= */

let dbReady = false;
let dbQueue = [];

function waitDB(fn){
if(dbReady) fn();
else dbQueue.push(fn);
}

/* =========================
   DB INIT (SAFE)
========================= */

let db;
let req = indexedDB.open("DiaryOS", 4);

req.onupgradeneeded = e => {
db = e.target.result;
if (!db.objectStoreNames.contains("diaries")) {
let store = db.createObjectStore("diaries", { keyPath: "id", autoIncrement: true });
store.createIndex("date", "date");
}
};

req.onsuccess = e => {
db = e.target.result;
dbReady = true;

dbQueue.forEach(fn => fn());
dbQueue = [];
};

/* =========================
   WINDOW SYSTEM (SAFE)
========================= */

let z = 10;

window.win = function(title, content){

safe(() => {
let w = document.createElement("div");
w.className = "win";
w.style.cssText = "position:absolute;top:120px;left:120px;z-index:"+z++;

w.innerHTML = `
<div class="bar">
<span>${title}</span>
<span onclick="this.closest('.win').remove()">✕</span>
</div>
<div class="body">${content}</div>
`;

document.body.appendChild(w);
return w;
});

};

/* =========================
   ENCRYPTION SAFE (NO CRASH)
========================= */

const enc = new TextEncoder();
const dec = new TextDecoder();

async function getKey(){
let base = await crypto.subtle.importKey(
"raw",
enc.encode("1234"),
"PBKDF2",
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:enc.encode("diary-salt"),
iterations:100000,
hash:"SHA-256"
},
base,
{ name:"AES-GCM", length:256 },
false,
["encrypt","decrypt"]
);
}

async function encrypt(text){
let key = await getKey();
let iv = crypto.getRandomValues(new Uint8Array(12));

let data = await crypto.subtle.encrypt(
{ name:"AES-GCM", iv },
key,
enc.encode(text)
);

return { iv:[...iv], data:[...new Uint8Array(data)] };
}

async function decrypt(obj){
let key = await getKey();

let iv = new Uint8Array(obj.iv);
let data = new Uint8Array(obj.data);

let res = await crypto.subtle.decrypt(
{ name:"AES-GCM", iv },
key,
data
);

return dec.decode(res);
}

/* =========================
   SAFE SAVE
========================= */

window.saveDiary = function(text, images){

waitDB(async () => {
let encrypted = await encrypt(text);

let tx = db.transaction("diaries","readwrite");
tx.objectStore("diaries").add({
text:encrypted,
images:images||[],
date:Date.now()
});

});
};

/* =========================
   NEW DIARY (SAFE)
========================= */

window.newDiary = function(){

waitDB(() => {

win("New Diary", `
<textarea id="t" style="width:100%;height:200px"></textarea>

<button onclick="saveDiary(t.value,currentImgs)">💾 Save</button>
<button onclick="emoji(t)">😊 Emoji</button>
<button onclick="addImg()">➕ Image</button>

<div id="p"></div>
`);

window.currentImgs=[];

window.addImg=function(){
let i=document.createElement("input");
i.type="file";

i.onchange=e=>{
for(let f of e.target.files){
let url=URL.createObjectURL(f);
currentImgs.push(url);
document.getElementById("p").innerHTML += `<img src="${url}" width="80">`;
}
};

i.click();
};

});

};

/* =========================
   PREVIOUS DIARIES (SAFE)
========================= */

window.openPrevious = function(){

waitDB(() => {

let tx = db.transaction("diaries","readonly");
let store = tx.objectStore("diaries");

let html = "<h3>Previous Diaries</h3>";

store.openCursor().onsuccess = async e => {
let c = e.target.result;

if(c){
let text = await decrypt(c.value.text);

html += `
<div onclick="viewDiary(${c.key})"
style="padding:6px;border:1px solid #444;margin:5px;cursor:pointer">
${text.slice(0,40)}...
</div>
`;

c.continue();
} else {
win("Previous Diaries", html);
}
};

});

};

/* VIEW SAFE */
window.viewDiary = function(id){

waitDB(() => {

let tx = db.transaction("diaries","readonly");
let store = tx.objectStore("diaries");

let req = store.get(id);

req.onsuccess = async () => {
let data = req.result;
let text = await decrypt(data.text);

win("Diary View", `
<p>${text}</p>
${(data.images||[]).map(i=>`<img src="${i}" width="120">`).join("")}
`);
};

});

};

/* =========================
   SEARCH + CALENDAR SAFE
========================= */

window.openSearchCalendar = function(){

waitDB(() => {

win("Search + Calendar", `
<input id="q" style="width:100%" placeholder="search or date">
<button onclick="run(q.value)">Search</button>
<div id="r"></div>
`);

window.run = function(q){

let tx = db.transaction("diaries","readonly");
let store = tx.objectStore("diaries");

let out=document.getElementById("r");
out.innerHTML="";

store.openCursor().onsuccess = async e => {
let c=e.target.result;

if(c){
let text=await decrypt(c.value.text);
let date=new Date(c.value.date).toDateString();

if(text.toLowerCase().includes(q.toLowerCase()) || date.includes(q)){
out.innerHTML+=`
<div onclick="viewDiary(${c.key})"
style="margin:5px;padding:5px;border:1px solid #555">
📅 ${date}<br>${text.slice(0,50)}
</div>`;
}

c.continue();
}
};

};

});

};

/* =========================
   EMOJI SAFE
========================= */

const emojis=["😀","😂","😍","😭","🔥","❤️","👍"];

window.emoji=function(t){

let p=document.getElementById("e");

if(!p){
p=document.createElement("div");
p.id="e";
document.body.appendChild(p);
}

p.style.cssText="position:fixed;bottom:50px;right:10px;background:#0008;padding:10px";

p.innerHTML="";

emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.style.cursor="pointer";
s.onclick=()=>t.value+=e;
p.appendChild(s);
});

};

/* =========================
   SETTINGS SAFE (NO CRASH)
========================= */

window.openSettings=function(){

win("Settings", `
<button onclick="toggleWallpaper()">Toggle Wallpaper</button>
<button onclick="clearData()">Reset Data</button>
`);

window.toggleWallpaper=function(){
window.wallpaperOn = !window.wallpaperOn;
};

window.clearData=function(){
indexedDB.deleteDatabase("DiaryOS");
win("Settings","<p>Reset Done</p>");
};

};

});

</script>
