<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS v5</title>

<style>
*{margin:0;padding:0;font-family:Segoe UI;color:white;box-sizing:border-box}
body{overflow:hidden;background:black}

/* BACKGROUNDS */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:1s;
z-index:-3;
}
#bg{filter:none}

/* LOCK SCREEN */
#lock{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
}

#time{font-size:70px;font-weight:200}

/* LOGIN */
#login{
position:fixed;inset:0;
display:none;
justify-content:center;
align-items:center;
backdrop-filter:blur(20px);
background:rgba(0,0,0,0.3);
flex-direction:column;
gap:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
outline:none;
}

/* EYE */
.eye{
cursor:pointer;
}

/* DESKTOP */
#desktop{
display:none;
height:100vh;
}

/* AI BOX */
#aiBox{
position:fixed;
bottom:60px;
right:20px;
width:280px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
padding:10px;
border-radius:10px;
display:none;
flex-direction:column;
}

textarea{
width:100%;
height:60px;
background:rgba(255,255,255,0.1);
border:none;
border-radius:8px;
padding:6px;
resize:none;
outline:none;
}

/* EMOJI */
#emojiBtn{
position:fixed;
bottom:15px;
right:15px;
font-size:22px;
cursor:pointer;
}

#emojiPanel{
position:fixed;
bottom:60px;
right:15px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
display:none;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.emoji{cursor:pointer}

/* TASKBAR CLOCK */
#clockTop{
position:fixed;
top:20px;
left:20px;
font-size:50px;
font-weight:200;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg" class="bg"></div>

<!-- LOCK SCREEN -->
<div id="lock">
<div id="time"></div>
<button onclick="showLogin()">Click to unlock</button>
</div>

<!-- LOGIN -->
<div id="login">
<input id="pass" type="password" placeholder="Password">
<span class="eye" onclick="togglePass()">👁️</span>
<button onclick="unlock()">Enter</button>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div id="clockTop"></div>

<!-- AI -->
<div id="aiBox">
<textarea id="aiInput" placeholder="Ask AI..."></textarea>
<div id="aiOut"></div>
</div>

<!-- EMOJI -->
<div id="emojiBtn" onclick="toggleEmoji()">😀</div>

<div id="emojiPanel"></div>

</div>

<script>

/* ===== 100+ BACKGROUNDS ===== */
const bgList=[];
for(let i=0;i<120;i++){
bgList.push(`https://source.unsplash.com/1600x900/?wallpaper,${i}`);
}

function setBG(){
document.getElementById("bg").style.backgroundImage=
`url('${bgList[Math.floor(Math.random()*bgList.length)]}')`;
}
setBG();

/* CLOCK */
setInterval(()=>{
let t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
time.innerText=t;
clockTop.innerText=t;
},1000);

/* FLOW CONTROL */
function showLogin(){
lock.style.display="none";
login.style.display="flex";
document.getElementById("bg").style.filter="blur(20px)";
}

function unlock(){
login.style.display="none";
desktop.style.display="block";
}

/* PASSWORD EYE */
function togglePass(){
let p=document.getElementById("pass");
p.type=p.type==="password"?"text":"password";
}

/* ===== AI ENGINE FIXED ===== */
document.getElementById("aiInput").addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendAI();
}
});

function openAI(){
document.getElementById("aiBox").style.display="flex";
}

function sendAI(){
let input=document.getElementById("aiInput").value;
let out=document.getElementById("aiOut");

let reply="";

if(input.includes("hello")) reply="Hey 👋";
else if(input.includes("how are you")) reply="I'm your diary AI 😄";
else if(input.includes("sad")) reply="Write it in your diary 💙";
else reply="You said: "+input;

out.innerHTML+="<div>"+reply+"</div>";
}

/* AUTO OPEN AI ON DESKTOP CLICK (TEST PURPOSE) */
document.body.addEventListener("dblclick",openAI);

/* ===== EMOJI SYSTEM FIXED ===== */
const emojis=["😀","😂","😍","😭","🔥","💀","👍","🙏","🎉","😎","🤖","💡","❤️","😡","🥶"];

let panel=document.getElementById("emojiPanel");

emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.className="emoji";
s.onclick=()=>insertEmoji(e);
panel.appendChild(s);
});

function toggleEmoji(){
panel.style.display=panel.style.display==="grid"?"none":"grid";
}

function insertEmoji(e){
let ai=document.getElementById("aiInput");
ai.value+=e;
}

</script>

</body>
</html>
