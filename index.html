<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaries</title>
<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --card:#1f2937;
  --accent:#6366f1;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

/* LAYOUT */
.app{
  display:grid;
  grid-template-columns:250px 1fr;
  height:100vh;
}

.sidebar{
  background:var(--panel);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{margin-bottom:20px;}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--card);
  color:white;
  cursor:pointer;
}

.main{
  padding:20px;
  overflow-y:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.settings-btn{
  cursor:pointer;
  background:var(--card);
  padding:8px 12px;
  border-radius:8px;
}

.settings{
  position:absolute;
  right:20px;
  top:60px;
  background:var(--panel);
  padding:15px;
  border-radius:10px;
  display:none;
  width:250px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:8px;
  padding:10px;
}

.btn{
  background:var(--accent);
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.entry{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}

.entry img{max-width:100%;border-radius:8px;margin-top:8px;}

/* LOCK */
.lock{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.time{font-size:3rem;}
.date{margin-bottom:20px;}

/* EMOJI */
.emoji-btn{position:absolute;right:10px;top:10px;cursor:pointer;}
.emoji-popup{position:absolute;right:10px;top:40px;background:#000;padding:10px;border-radius:10px;display:none;max-height:200px;overflow:auto;}
.emoji-popup span{padding:5px;cursor:pointer;}

</style>
</head>
<body>

<div id="lock" class="lock">
<div class="time" id="time"></div>
<div class="date" id="date"></div>
<input type="password" id="pass">
<button class="btn" onclick="unlock()">Unlock</button>
</div>

<div class="app">

<div class="sidebar">
<h2>📔 Diaries</h2>
<button onclick="show('compose')">✍️ Compose</button>
<button onclick="show('past')">📜 Past Diaries</button>
<button onclick="show('about')">👤 About</button>
</div>

<div class="main">
<div class="topbar">
<h3 id="title">Compose</h3>
<div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</div>

<div id="settings" class="settings">
<h4>Settings</h4>
<input type="password" id="newPass" placeholder="New password"><br>
<button class="btn" onclick="changePass()">Change Password</button><br>
<button class="btn" onclick="clearData()">Clear Data</button>
</div>

<div id="compose" class="card">
<div style="position:relative">
<div class="emoji-btn" onclick="toggleEmoji()">😊</div>
<div id="emoji" class="emoji-popup"></div>
<textarea id="note"></textarea>
</div>
<button class="btn" onclick="save()">Save</button>
</div>

<div id="past" class="card" style="display:none">
<input id="search" placeholder="Search" oninput="display()">
<input type="date" id="dateFilter" onchange="display()">
<div id="entries"></div>
</div>

<div id="about" class="card" style="display:none">
<p><b>Name:</b> Adhvik Mahesh</p>
<p><b>Grade:</b> 9</p>
</div>

</div>
</div>

<script>
if(!localStorage.pass) localStorage.pass="adhvik_diary";

function unlock(){
 if(pass.value===localStorage.pass){lock.style.display="none"}
 else alert("Wrong Password")
}

function changePass(){localStorage.pass=newPass.value;alert("Changed")}
function clearData(){localStorage.removeItem('notes');alert("Cleared")}

function toggleSettings(){settings.style.display=settings.style.display==='block'?'none':'block'}

function updateTime(){
 let d=new Date();
 time.innerText=d.toLocaleTimeString('en-SG');
 date.innerText=d.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateTime,1000);updateTime();

const emojis="😄 😂 😍 😭 😎 🤯 🥳 🤩 😈 👻 💀 🔥 ✨ ❤️ 💯 👍 🙌 🧠 📚 🚀 🌙 ☕ 🎮 📱 🎧 ⚽ 🍕".split(" ");
function toggleEmoji(){
 emoji.style.display=emoji.style.display==='block'?'none':'block';
 emoji.innerHTML=emojis.map(e=>`<span onclick="add('${e}')">${e}</span>`).join('');
}
function add(e){note.value+=e}

function save(){
 let n=JSON.parse(localStorage.notes||"[]");
 n.push({text:note.value,date:new Date().toLocaleDateString()});
 localStorage.notes=JSON.stringify(n);
 note.value="";
}

function display(){
 let n=JSON.parse(localStorage.notes||"[]");
 let s=search.value.toLowerCase();
 let d=dateFilter.value;
 entries.innerHTML="";
 n.slice().reverse().forEach((e,i)=>{
  if(s && !e.text.toLowerCase().includes(s)) return;
  if(d && e.date!==new Date(d).toLocaleDateString()) return;
  let t=e.text.replace(/\[img:(.*?)\]/g,'<img src="$1">');
  entries.innerHTML+=`<div class='entry'>${e.date}<p contenteditable onblur="edit(${i},this.innerText)">${t}</p><button onclick="del(${i})">Delete</button></div>`;
 });
}

function del(i){let n=JSON.parse(localStorage.notes);n.splice(i,1);localStorage.notes=JSON.stringify(n);display()}
function edit(i,text){let n=JSON.parse(localStorage.notes);n[i].text=text;localStorage.notes=JSON.stringify(n)}

function show(id){
 compose.style.display='none';
 past.style.display='none';
 about.style.display='none';
 document.getElementById(id).style.display='block';
 title.innerText=id.charAt(0).toUpperCase()+id.slice(1);
 if(id==='past') display();
}
</script>

</body>
</html>
