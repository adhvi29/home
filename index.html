<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diary OS v4 FIX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{overflow:hidden;background:black;color:white}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;inset:0;
background-size:cover;
background-position:center;
transition:opacity 1s ease;
}
#bg1{opacity:1}
#bg2{opacity:0}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(14px);
}

/* ===== LOCK ===== */
#lock{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
cursor:pointer;
}

#box{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(25px);
border-radius:15px;
}

#login{
display:none;
margin-top:10px;
gap:8px;
}

input{
padding:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}

/* ===== TOPBAR ===== */
#topbar{
position:fixed;
top:0;left:0;right:0;
height:42px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
z-index:1000;
}

.btn{cursor:pointer;padding:6px 10px;border-radius:8px}
.btn:hover{background:rgba(255,255,255,0.1)}

/* ===== START MENU ===== */
#startMenu{
position:fixed;
bottom:50px;left:10px;
width:200px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(20px);
padding:10px;
border-radius:12px;
display:none;
z-index:1000;
}

/* ===== WINDOW ===== */
.window{
position:absolute;
width:340px;
height:320px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
border-radius:12px;
overflow:hidden;
animation:pop .15s ease;
}

@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}

.titlebar{
background:rgba(255,255,255,0.1);
padding:6px;
display:flex;
justify-content:space-between;
cursor:grab;
}

.content{padding:10px}

/* ===== TASKBAR ===== */
#taskbar{
position:fixed;
bottom:0;left:0;right:0;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

textarea{
width:100%;
height:140px;
background:rgba(255,255,255,0.08);
border:none;
color:white;
border-radius:10px;
padding:10px;
}

button{
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:6px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div class="overlay"></div>

<!-- LOCK -->
<div id="lock">
 <div id="box">
   <h1 id="clock"></h1>
   <p>Click to unlock</p>

   <div id="login">
     <input id="user" placeholder="User">
     <input id="pass" type="password" placeholder="Password">
     <button onclick="login()">Unlock</button>
   </div>
 </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
 <div>
   <span class="btn" onclick="newDiary()">＋ New</span>
   <span class="btn" onclick="toggleStart()">🪟 Start</span>
 </div>
 <div>
   <span class="btn" onclick="alert('Settings')">⚙</span>
 </div>
</div>

<!-- START MENU -->
<div id="startMenu">
 <div onclick="newDiary()">📓 New Diary</div>
 <div onclick="openPrev()">📂 Previous</div>
 <div onclick="openSearch()">🔍 Search</div>
 <div onclick="openCalendar()">📅 Calendar</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">Diary OS v4</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

/* ===== BACKGROUND FIX (GUARANTEED LOAD) ===== */
const images=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let index=0;

function setBG(){
const a=document.getElementById("bg1");
const b=document.getElementById("bg2");

b.style.backgroundImage=`url(${images[Math.floor(Math.random()*images.length)]})`;
b.style.opacity=1;
a.style.opacity=0;

setTimeout(()=>{
a.style.backgroundImage=b.style.backgroundImage;
a.style.opacity=1;
b.style.opacity=0;
},900);

index++;
}

/* FIRST LOAD — IMPORTANT FIX */
setBG();

/* AUTO ROTATE */
setInterval(setBG,12000);

/* ===== CLOCK ===== */
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

/* ===== LOCK SYSTEM ===== */
let unlocked=false;

document.getElementById("lock").onclick=()=>{
document.getElementById("login").style.display="flex";
};

window.login=function(){
if(user.value && pass.value){
document.getElementById("lock").style.display="none";
unlocked=true;
}else alert("Enter credentials");
}

/* ===== WINDOW SYSTEM ===== */
let z=10;

window.newWindow=function(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="100px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.parentNode.parentNode.remove()">✖</span>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);

/* drag */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=e=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=e=>{
if(drag){
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=false;
}

/* ===== APPS ===== */
window.newDiary=()=>newWindow("New Diary",`
<textarea id="t"></textarea>
<button onclick="alert('Saved (DB next upgrade)')">💾 Save</button>
<button onclick="alert('Emoji 😊😂❤️')">😊</button>
`);

window.openPrev=()=>newWindow("Previous Diaries","<p>No entries yet</p>");

window.openSearch=()=>newWindow("Search","<input placeholder='search...'><button>Go</button>");

window.openCalendar=()=>newWindow("Calendar","<p>Calendar ready</p>");

/* ===== START MENU ===== */
window.toggleStart=()=>{
startMenu.style.display=startMenu.style.display==="block"?"none":"block";
};

});

</script>

</body>
</html>
