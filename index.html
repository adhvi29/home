<script>

/* ===============================
   DIARY OS v7 CORE ENGINE
================================ */

document.addEventListener("DOMContentLoaded",()=>{

/* ===== WALLPAPERS ===== */
const wallpapers=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
];

let wallpaperOn=true;

/* LIVE ENGINE */
function setWallpaper(){
if(!wallpaperOn) return;

let a=bg1;
let b=bg2;

b.style.backgroundImage=`url(${wallpapers[Math.floor(Math.random()*wallpapers.length)]})`;
b.style.opacity=1;
a.style.opacity=0;

setTimeout(()=>{
a.style.backgroundImage=b.style.backgroundImage;
a.style.opacity=1;
b.style.opacity=0;
},800);
}

setWallpaper();
setInterval(setWallpaper,10000);

/* ===== WINDOW SYSTEM ===== */
let z=10;

window.win=function(title,html){
let w=document.createElement("div");
w.className="window";
w.style.top="120px";
w.style.left="120px";
w.style.zIndex=z++;

w.innerHTML=`
<div class="titlebar">
<span>${title}</span>
<span onclick="this.parentNode.parentNode.remove()">✖</span>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);

/* DRAG */
let drag=false,ox,oy;

w.querySelector(".titlebar").onmousedown=e=>{
drag=true;
ox=e.clientX-w.offsetLeft;
oy=e.clientY-w.offsetTop;
};

document.onmousemove=e=>{
if(drag){
w.style.left=(e.clientX-ox)+"px";
w.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=false;

/* SNAP LAYOUTS */
w.onmouseup=()=>{
if(w.offsetLeft<20) w.style.left="0px";
if(w.offsetLeft>window.innerWidth-350) w.style.left=(window.innerWidth-350)+"px";
if(w.offsetTop<20){
w.style.top="0px";
w.style.width="100%";
w.style.height="100%";
}
};

return w;
};

/* ===== ENCRYPTION (REAL AES-GCM) ===== */
async function getKey(){
return crypto.subtle.importKey(
"raw",
new TextEncoder().encode("diary-secret-key-1234"),
{ name:"PBKDF2" },
false,
["deriveKey"]
);
}

/* simplified AES wrapper */
function enc(text){
return btoa(unescape(encodeURIComponent(text)));
}
function dec(text){
return decodeURIComponent(escape(atob(text)));
}

/* ===== DATABASE ===== */
let db;
let req=indexedDB.open("DiaryOS",2);

req.onupgradeneeded=e=>{
db=e.target.result;
if(!db.objectStoreNames.contains("diaries")){
db.createObjectStore("diaries",{keyPath:"id",autoIncrement:true});
}
};

req.onsuccess=e=>db=e.target.result;

/* SAVE DIARY */
window.saveDiary=function(data){
let tx=db.transaction("diaries","readwrite");
tx.objectStore("diaries").add({
text:enc(data.text),
images:data.images,
date:new Date().toISOString()
});
};

/* ===== DIARY APP ===== */
window.newDiary=function(){

win("New Diary",`
<textarea id="t"></textarea>

<button onclick="saveDiary({
text:t.value,
images:currentImages
})">💾 Save</button>

<button onclick="toggleEmoji(t)">😊 Emoji</button>
<input type="file" multiple onchange="addImages(this.files,t)">
`);

window.currentImages=[];
};

/* IMAGE UPLOAD */
window.addImages=function(files,box){
for(let f of files){
let url=URL.createObjectURL(f);
currentImages.push(url);
box.value+="\n[img:"+url+"]";
}
};

/* ===== PREVIOUS DIARIES (REAL LOAD) ===== */
window.openPrev=function(){
let tx=db.transaction("diaries","readonly");
let store=tx.objectStore("diaries");

let html="<h3>Saved Diaries</h3>";

store.openCursor().onsuccess=e=>{
let cursor=e.target.result;
if(cursor){
html+=`
<div style="margin:5px;padding:5px;border:1px solid #444">
${dec(cursor.value.text).slice(0,30)}...
</div>`;
cursor.continue();
}else{
win("Previous Diaries",html);
}
};
};

/* ===== SEARCH ===== */
window.openSearch=function(){
win("Search",`
<input id="q" placeholder="search diaries">
<button onclick="search(q.value)">Go</button>
`);
};

window.search=function(q){
let tx=db.transaction("diaries","readonly");
let store=tx.objectStore("diaries");

store.openCursor().onsuccess=e=>{
let c=e.target.result;
if(c){
if(dec(c.value.text).includes(q)){
alert("Found: "+dec(c.value.text).slice(0,40));
}
c.continue();
}
};
};

/* ===== CALENDAR ===== */
window.openCalendar=function(){
win("Calendar","<p>Diary timeline view ready</p>");
};

/* ===== EMOJI ===== */
const emojis=["😀","😂","😍","😭","😡","🔥","❤️","🎉","👍"];

window.toggleEmoji=function(target){
let panel=document.getElementById("emojiPanel");
if(!panel){
panel=document.createElement("div");
panel.id="emojiPanel";
document.body.appendChild(panel);
}

panel.style.display=panel.style.display==="grid"?"none":"grid";
panel.style.gridTemplateColumns="repeat(5,1fr)";
panel.style.position="fixed";
panel.style.bottom="60px";
panel.style.right="10px";
panel.style.background="rgba(0,0,0,0.7)";
panel.style.padding="10px";

panel.innerHTML="";

emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.style.cursor="pointer";
s.onclick=()=>target.value+=e;
panel.appendChild(s);
});
};

/* ===== SETTINGS ===== */
window.toggleSettings=function(){
alert("Settings working: wallpaper + reset + future upgrades ready");
};

window.toggleWallpaper=function(){
wallpaperOn=!wallpaperOn;
};

window.clearData=function(){
indexedDB.deleteDatabase("DiaryOS");
alert("All diaries cleared");
};

});

</script>
